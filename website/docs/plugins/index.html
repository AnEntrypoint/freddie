<script id="__site__" type="application/json">{"title":"Plugins","slug":"plugins","siteName":"Freddie","navItems":[["Home","/freddie/"],["Plugins","/freddie/plugins/"],["Architecture","/freddie/architecture/"],["CLI","/freddie/cli/"],["Tools","/freddie/tools/"],["Platforms","/freddie/platforms/"],["Skills","/freddie/skills/"],["Development","/freddie/development/"]],"theme":"auto","hero":{"heading":"plugins","subheading":"every subsystem in freddie is a plugin against one universal contract","accent":"pi for headless, gui for the dashboard, both for full-stack.","body":"tools, gateway adapters, memory backends, skills, cron handlers, dashboard pages, agent extensions, slash commands, CLI subcommands — they all live as plugin directories under `plugins/`. each one declares which surfaces it touches, what it depends on, and registers itself through one register(ctx) call.","badges":[{"label":"120+","desc":"in-tree plugins"},{"label":"1 contract","desc":"pi + gui"},{"label":"topo-sort","desc":"dependency-aware"},{"label":"surface guard","desc":"enforced at load"}],"ctas":[{"label":"contract source","href":"https://github.com/AnEntrypoint/freddie/blob/master/src/host/contract.js"},{"label":"host source","href":"https://github.com/AnEntrypoint/freddie/blob/master/src/host/host.js"},{"label":"write your own","href":"#how-to-write"}]},"sections":[{"id":"when","name":"when do you reach for a plugin?","lede":"every time you want to add behavior. there is no other extension surface.","features":[{"name":"a tool the agent can call","desc":"drop `plugins/\u003cname>/{plugin,handler}.js`. plugin.js calls `pi.tools.register(spec)`.","benefit":"tool is live next boot. no glue, no decorators, no manifest."},{"name":"a gateway adapter for a new platform","desc":"drop `plugins/platform-\u003cname>/`. plugin.js calls `pi.platforms.register({name, module})` exposing an EventEmitter adapter class.","benefit":"gateway picks it up via `makePlatform(name)`."},{"name":"a memory provider","desc":"drop `plugins/memory-\u003cname>/`. plugin.js calls `pi.memory.register({name, module})` exposing a class with syncTurn + prefetch.","benefit":"`createMemoryProvider(name)` resolves it without touching freddie core."},{"name":"a dashboard route or page","desc":"drop `plugins/gui-\u003cname>/`. plugin.js calls `gui.route('GET', '/api/x', handler)` or `gui.page(slug, def)`.","benefit":"express picks up routes, AppShell picks up pages, no server.js edit."},{"name":"a CLI subcommand","desc":"any plugin can call `pi.cli.register({name, description, args, options, action})`.","benefit":"`node bin/freddie.js \u003cname>` works on next boot. the CLI is itself plugin-driven."},{"name":"a hook on the agent loop","desc":"any plugin can call `hooks.on('preToolCall' | 'preLlmCall' | 'onTurnStart' | …, async fn)`.","benefit":"middleware-style intercept without forking the agent machine."}]},{"id":"why","name":"why this design over a framework?","lede":"one contract is the only abstraction. everything else is a function call against a registry.","features":[{"name":"one shape covers every concern","desc":"`{ name, surfaces: 'pi'|'gui'|'both', requires?: [...], register(ctx) }`. ctx exposes pi (headless verbs), gui (dashboard verbs), hooks, log, config, host, env.","benefit":"nothing to learn beyond the four ctx slots and the verbs you actually call."},{"name":"surfaces are guarded at load time","desc":"a `surfaces:'pi'` plugin that calls `gui.route(...)` throws with the plugin name and the verb name. impossible to ship a leaky surface boundary.","benefit":"load-time guarantee replaces runtime drift."},{"name":"requires is topo-sorted, cycles throw","desc":"`requires: ['core-agent-machine']` means the host calls register() in dependency order. cycle = synchronous error with the path.","benefit":"load order is data, not convention."},{"name":"zero compat shims","desc":"pre-v1. the old src/tools/registry.js is gone, src/gateway/platforms/ is gone, src/plugins/memory/ is gone. one path to extend, no legacy way.","benefit":"the codebase has one extension story, told once, no archaeology."},{"name":"same surfaces, two lenses","desc":"a `surfaces:'both'` plugin sees both `ctx.pi` and `ctx.gui`. e.g. an observability plugin can register a `pi` debug snapshot AND a `gui` route in the same file.","benefit":"cross-cutting concerns stop fragmenting across two layers."},{"name":"every subsystem becomes liftable","desc":"each `plugins/\u003cname>/` directory has its own deps and entry. lifting it to a separate npm package is moving the directory. the contract does not change.","benefit":"npm-publishable plugins on day one, no rewrite."}]},{"id":"how-to-write","name":"how do I write a plugin?","lede":"one directory, one file, one default export.","features":[{"name":"1 — pick a category","desc":"tools/\u003cname>/, platform-\u003cname>/, memory-\u003cname>/, gui-\u003cname>/, core-\u003cname>/, or any prefix you like. naming is convention, not contract."},{"name":"2 — declare surfaces","desc":"`surfaces: 'pi'` (headless), `'gui'` (dashboard), or `'both'`. anything else throws on load."},{"name":"3 — declare requires (optional)","desc":"`requires: ['core-agent-machine', 'tool-bash']` — names of plugins that must register before yours."},{"name":"4 — implement register(ctx)","desc":"ctx = { pi, gui, hooks, log, config, host, env }. call the verbs you need. throw on hard errors."},{"name":"5 — drop the directory","desc":"`plugins/\u003cname>/plugin.js` (default export). next boot the host discovers and loads it."}]},{"id":"ctx","name":"what's inside ctx?","lede":"a small set of registries and one logger. that's the whole api.","features":[{"name":"ctx.pi — headless verbs","desc":"tools, envs, commands, crons, platforms, memory, skills, contexts, agentExts, cli — each is a `{register, get, list, has, size}` registry."},{"name":"ctx.gui — dashboard verbs","desc":"route(method, path, handler), page(slug, def), nav(item), debug(name, snapshotFn), api(group, def), asset(path, content)."},{"name":"ctx.hooks — middleware","desc":"on(name, fn) and invoke(name, payload). names: preToolCall, postToolCall, preLlmCall, postLlmCall, onSessionStart, onSessionEnd, onTurnStart, onTurnEnd, onMessageInbound, onMessageOutbound."},{"name":"ctx.log — scoped logger","desc":"info/warn/error each emit a structured JSON line tagged with the plugin name."},{"name":"ctx.config — scoped config","desc":"get(k, default), set(k, v), all() — namespaced under `plugins.\u003cplugin-name>` so plugins can't stomp each other."},{"name":"ctx.host — read access to the wider host","desc":"host.plugins() and host.get(name) for cross-plugin introspection."},{"name":"ctx.env — process.env passthrough","desc":"read-only proxy. respects the parent env, no surprise mutations."}]}],"examples":[{"label":"contract source","href":"https://github.com/AnEntrypoint/freddie/blob/master/src/host/contract.js","desc":"39 lines, the whole shape"},{"label":"host source","href":"https://github.com/AnEntrypoint/freddie/blob/master/src/host/host.js","desc":"load + dispatch"},{"label":"bash plugin","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/bash","desc":"simplest tool"},{"label":"memory provider plugin","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/memory-honcho","desc":"provider shape"},{"label":"gui route plugin","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/gui-sessions","desc":"dashboard route"},{"label":"core-cli plugin","href":"https://github.com/AnEntrypoint/freddie/blob/master/plugins/core-cli/plugin.js","desc":"CLI is itself plugin-sourced"}],"bodyHtml":"\u003ch2>one-shot writing template\u003c/h2>\n\u003cpre>\n// plugins/my-thing/plugin.js\nexport default {\n    name: 'my-thing',\n    surfaces: 'pi',\n    requires: ['core-agent-machine'],\n    register({ pi, hooks, log, config }) {\n        pi.tools.register({\n            name: 'my_tool',\n            schema: { name: 'my_tool', description: '…', parameters: { type: 'object', properties: { x: { type: 'string' } }, required: ['x'] } },\n            handler: async ({ x }) =&gt; ({ ok: true, x }),\n        })\n        hooks.on('preToolCall', async (p) =&gt; { log.info('tool fired', { name: p.name }); return p })\n    },\n}\n\u003c/pre>\n\u003ch2>boot the host yourself\u003c/h2>\n\u003cpre>\nimport { bootHost } from 'freddie/src/host/index.js'\nconst host = await bootHost()\nconsole.log(host.plugins().length)         // 120+\nconsole.log(host.pi.tools.list().length)   // 70+\nconsole.log(host.gui.routes.list().length) // 30+\nawait host.pi.dispatchTool('bash', { command: 'echo hi', timeout_ms: 5000 })\n\u003c/pre>\n\u003ch2>philosophy\u003c/h2>\n\u003cul>\n\u003cli>one contract, one host, no compat shims.\u003c/li>\n\u003cli>extension is a directory and a default export.\u003c/li>\n\u003cli>surfaces guarded at load. cycles thrown synchronously. no silent fallbacks.\u003c/li>\n\u003cli>every subsystem is liftable to its own npm package without changing the contract.\u003c/li>\n\u003c/ul>"}</script>

<body>
<div id="app"></div>
<script type="module">
import { mount, components as C, h } from 'anentrypoint-design';
const data = JSON.parse(document.getElementById('__site__').textContent);
const RAILS = ['rail-green', 'rail-purple', 'rail-mascot', 'rail-sun', 'rail-flame', 'rail-sky'];

function heroNode(hero) {
  if (!hero) return null;
  const badges = Array.isArray(hero.badges) ? hero.badges.filter(Boolean) : [];
  const badgeRow = badges.length
    ? h('div', { class: 'ds-hero-stats' }, ...badges.map((b, i) =>
        h('span', { key: i, class: 'ds-hero-stat' },
          h('strong', { class: 'ds-hero-stat-n' }, String(b.label != null ? b.label : b)),
          b.desc ? h('span', { class: 'ds-hero-stat-l' }, String(b.desc)) : null,
        )))
    : null;
  return h('div', { class: 'ds-hero' },
    hero.eyebrow ? h('span', { class: 'eyebrow' }, hero.eyebrow) : null,
    h('h1', { class: 'ds-hero-title' }, hero.heading || hero.title || data.title),
    (hero.body || hero.subheading) ? h('p', { class: 'ds-hero-body' },
      hero.body || hero.subheading,
      hero.accent ? h('span', { class: 'ds-hero-accent' }, ' ' + hero.accent) : null,
    ) : null,
    Array.isArray(hero.ctas) && hero.ctas.length
      ? h('div', { class: 'ds-hero-actions' }, ...hero.ctas.map((c, i) =>
          h('a', { key: i, class: i === 0 ? 'btn btn-accent' : 'btn btn-ghost', href: c.href || '#' }, c.label || c.cta || 'go')))
      : null,
    badgeRow,
  );
}

function sectionNode(sec, idx) {
  const rail = RAILS[idx % RAILS.length];
  const features = sec.features || sec.items || [];
  const rows = features.map((f, i) => {
    const kids = [h('div', { key: 't', class: 'ds-feature-title' }, String(f.name || ''))];
    if (f.desc) kids.push(h('div', { key: 'd', class: 'ds-feature-desc', innerHTML: String(f.desc).replace(/`([^`]+)`/g, '<code>$1</code>') }));
    if (f.benefit) kids.push(h('div', { key: 'b', class: 'ds-feature-benefit' }, String(f.benefit)));
    return h('div', { key: i, class: 'ds-feature ' + rail }, ...kids);
  });
  return C.Section({
    title: sec.name || sec.title || sec.id,
    children: [
      sec.lede ? h('p', { class: 'ds-lede' }, sec.lede) : null,
      ...rows,
      sec.body && sec.body.length >= 240 ? h('div', { class: 'page-body', innerHTML: __md(sec.body) }) : null,
    ].filter(Boolean),
  });
}

function examplesNode(examples) {
  if (!examples || !examples.length) return null;
  return C.Section({
    title: 'explore',
    children: examples.map((e, i) => {
      const rail = RAILS[(i + 1) % RAILS.length];
      const kids = [
        h('span', { key: 'c', class: 'code' }, String(i + 1).padStart(2, '0')),
        h('span', { key: 't', class: 'title' }, String(e.label || e.name || e.href || '')),
      ];
      if (e.desc) kids.push(h('span', { key: 'm', class: 'meta dim' }, ' — ' + e.desc));
      kids.push(h('span', { key: 'a', class: 'ds-row-arrow' }, '->'));
      return h('a', { key: i, class: 'row ' + rail, href: e.href || '#' }, ...kids);
    }),
  });
}

// minimal client-side markdown renderer matching server-side renderer (idempotent for already-html bodies)
function __md(md) {
  const lines = String(md || '').split('\n');
  const out = []; let inCode = false, inList = false;
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = (s) => s.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  for (const line of lines) {
    if (line.startsWith('```')) { if (inCode) { out.push('</pre>'); inCode = false; } else { out.push('<pre>'); inCode = true; } continue; }
    if (inCode) { out.push(esc(line)); continue; }
    if (line.startsWith('# ')) out.push('<h1>' + esc(line.slice(2)) + '</h1>');
    else if (line.startsWith('## ')) out.push('<h2>' + esc(line.slice(3)) + '</h2>');
    else if (line.startsWith('### ')) out.push('<h3>' + esc(line.slice(4)) + '</h3>');
    else if (line.startsWith('- ')) { if (!inList) { out.push('<ul>'); inList = true; } out.push('<li>' + inl(esc(line.slice(2))) + '</li>'); }
    else { if (inList) { out.push('</ul>'); inList = false; } if (line.trim()) out.push('<p>' + inl(esc(line)) + '</p>'); }
  }
  if (inList) out.push('</ul>');
  if (inCode) out.push('</pre>');
  return out.join('\n');
}

const bodyNode = data.bodyHtml ? C.Section({ children: h('div', { class: 'page-body', innerHTML: data.bodyHtml }) }) : null;

const mainChildren = [
  heroNode(data.hero),
  ...data.sections.map(sectionNode),
  examplesNode(data.examples),
  bodyNode,
].filter(Boolean);

mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: data.siteName, items: data.navItems, active: data.title }),
  crumb: C.Crumb({ leaf: data.title }),
  main: h('div', { class: 'app-stage' }, ...mainChildren),
  status: C.Status({ left: [data.siteName.toLowerCase(), data.slug], right: ['live'] }),
}));
</script>
</body>
