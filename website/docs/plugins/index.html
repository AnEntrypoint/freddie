<div id="app"></div>
<script type="module">
import { mount, components as C } from 'anentrypoint-design';
const navItems = [["Home","/"],["Plugins","/plugins/"],["Architecture","/architecture/"],["CLI","/cli/"],["Tools","/tools/"],["Platforms","/platforms/"],["Skills","/skills/"],["Development","/development/"]];
mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: 'Freddie', items: navItems, active: "Plugins" }),
  crumb: C.Crumb({ leaf: "Plugins" }),
  main: C.h('div', { class: 'app-stage', innerHTML: "<div class=\"ds-hero\">\n  <h1 class=\"ds-hero-title\">plugins</h1>\n  <p class=\"ds-hero-body\">every subsystem in freddie is a plugin against one universal contract <span class=\"ds-hero-accent\">pi for headless, gui for the dashboard, both for full-stack.</span></p>\n  <p class=\"ds-hero-body\">tools, gateway adapters, memory backends, skills, cron handlers, dashboard pages, agent extensions, slash commands, CLI subcommands — they all live as plugin directories under `plugins/`. each one declares which surfaces it touches, what it depends on, and registers itself through one register(ctx) call.</p>\n  <div class=\"ds-hero-badges\"><span class=\"chip\"><strong>120+</strong><span style=\"opacity:.7\"> in-tree plugins</span></span> <span class=\"chip\"><strong>1 contract</strong><span style=\"opacity:.7\"> pi + gui</span></span> <span class=\"chip\"><strong>topo-sort</strong><span style=\"opacity:.7\"> dependency-aware</span></span> <span class=\"chip\"><strong>surface guard</strong><span style=\"opacity:.7\"> enforced at load</span></span></div>\n  <div class=\"ds-hero-ctas\" style=\"margin-top:16px;display:flex;gap:8px;flex-wrap:wrap\"><a class=\"btn-primary\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/src/host/contract.js\">contract source</a><a class=\"btn\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/src/host/host.js\">host source</a><a class=\"btn\" href=\"#how-to-write\">write your own</a></div>\n</div><section class=\"ds-section rail-green\" id=\"when\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">when do you reach for a plugin?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">every time you want to add behavior. there is no other extension surface.</p>\n  <div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">a tool the agent can call</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">drop <code>plugins/&lt;name&gt;/{plugin,handler}.js</code>. plugin.js calls <code>pi.tools.register(spec)</code>.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">tool is live next boot. no glue, no decorators, no manifest.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">a gateway adapter for a new platform</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">drop <code>plugins/platform-&lt;name&gt;/</code>. plugin.js calls <code>pi.platforms.register({name, module})</code> exposing an EventEmitter adapter class.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">gateway picks it up via `makePlatform(name)`.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">a memory provider</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">drop <code>plugins/memory-&lt;name&gt;/</code>. plugin.js calls <code>pi.memory.register({name, module})</code> exposing a class with syncTurn + prefetch.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">`createMemoryProvider(name)` resolves it without touching freddie core.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">a dashboard route or page</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">drop <code>plugins/gui-&lt;name&gt;/</code>. plugin.js calls <code>gui.route('GET', '/api/x', handler)</code> or <code>gui.page(slug, def)</code>.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">express picks up routes, AppShell picks up pages, no server.js edit.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">a CLI subcommand</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">any plugin can call <code>pi.cli.register({name, description, args, options, action})</code>.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">`node bin/freddie.js &lt;name&gt;` works on next boot. the CLI is itself plugin-driven.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">a hook on the agent loop</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">any plugin can call <code>hooks.on('preToolCall' | 'preLlmCall' | 'onTurnStart' | …, async fn)</code>.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">middleware-style intercept without forking the agent machine.</div>\n</div>\n  \n</section>\n<section class=\"ds-section rail-purple\" id=\"why\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">why this design over a framework?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">one contract is the only abstraction. everything else is a function call against a registry.</p>\n  <div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">one shape covers every concern</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>{ name, surfaces: 'pi'|'gui'|'both', requires?: [...], register(ctx) }</code>. ctx exposes pi (headless verbs), gui (dashboard verbs), hooks, log, config, host, env.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">nothing to learn beyond the four ctx slots and the verbs you actually call.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">surfaces are guarded at load time</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">a <code>surfaces:'pi'</code> plugin that calls <code>gui.route(...)</code> throws with the plugin name and the verb name. impossible to ship a leaky surface boundary.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">load-time guarantee replaces runtime drift.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">requires is topo-sorted, cycles throw</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>requires: ['core-agent-machine']</code> means the host calls register() in dependency order. cycle = synchronous error with the path.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">load order is data, not convention.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">zero compat shims</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">pre-v1. the old src/tools/registry.js is gone, src/gateway/platforms/ is gone, src/plugins/memory/ is gone. one path to extend, no legacy way.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">the codebase has one extension story, told once, no archaeology.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">same surfaces, two lenses</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">a <code>surfaces:'both'</code> plugin sees both <code>ctx.pi</code> and <code>ctx.gui</code>. e.g. an observability plugin can register a <code>pi</code> debug snapshot AND a <code>gui</code> route in the same file.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">cross-cutting concerns stop fragmenting across two layers.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">every subsystem becomes liftable</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">each <code>plugins/&lt;name&gt;/</code> directory has its own deps and entry. lifting it to a separate npm package is moving the directory. the contract does not change.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">npm-publishable plugins on day one, no rewrite.</div>\n</div>\n  \n</section>\n<section class=\"ds-section rail-mascot\" id=\"how-to-write\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">how do I write a plugin?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">one directory, one file, one default export.</p>\n  <div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">1 — pick a category</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">tools/&lt;name&gt;/, platform-&lt;name&gt;/, memory-&lt;name&gt;/, gui-&lt;name&gt;/, core-&lt;name&gt;/, or any prefix you like. naming is convention, not contract.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">2 — declare surfaces</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>surfaces: 'pi'</code> (headless), <code>'gui'</code> (dashboard), or <code>'both'</code>. anything else throws on load.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">3 — declare requires (optional)</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>requires: ['core-agent-machine', 'tool-bash']</code> — names of plugins that must register before yours.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">4 — implement register(ctx)</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">ctx = { pi, gui, hooks, log, config, host, env }. call the verbs you need. throw on hard errors.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">5 — drop the directory</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>plugins/&lt;name&gt;/plugin.js</code> (default export). next boot the host discovers and loads it.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-sun\" id=\"ctx\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">what's inside ctx?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">a small set of registries and one logger. that's the whole api.</p>\n  <div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.pi — headless verbs</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">tools, envs, commands, crons, platforms, memory, skills, contexts, agentExts, cli — each is a <code>{register, get, list, has, size}</code> registry.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.gui — dashboard verbs</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">route(method, path, handler), page(slug, def), nav(item), debug(name, snapshotFn), api(group, def), asset(path, content).</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.hooks — middleware</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">on(name, fn) and invoke(name, payload). names: preToolCall, postToolCall, preLlmCall, postLlmCall, onSessionStart, onSessionEnd, onTurnStart, onTurnEnd, onMessageInbound, onMessageOutbound.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.log — scoped logger</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">info/warn/error each emit a structured JSON line tagged with the plugin name.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.config — scoped config</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">get(k, default), set(k, v), all() — namespaced under <code>plugins.&lt;plugin-name&gt;</code> so plugins can't stomp each other.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.host — read access to the wider host</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">host.plugins() and host.get(name) for cross-plugin introspection.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">ctx.env — process.env passthrough</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">read-only proxy. respects the parent env, no surprise mutations.</div>\n  \n</div>\n  \n</section><section class=\"ds-section\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">explore</h2>\n  <a class=\"row rail-purple\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/src/host/contract.js\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">01</span>\n  <span class=\"title\" style=\"font-weight:600\">contract source</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— 39 lines</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-mascot\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/src/host/host.js\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">02</span>\n  <span class=\"title\" style=\"font-weight:600\">host source</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— load + dispatch</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-sun\" href=\"https://github.com/AnEntrypoint/freddie/tree/master/plugins/bash\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">03</span>\n  <span class=\"title\" style=\"font-weight:600\">bash plugin</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— simplest tool</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-flame\" href=\"https://github.com/AnEntrypoint/freddie/tree/master/plugins/memory-honcho\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">04</span>\n  <span class=\"title\" style=\"font-weight:600\">memory provider plugin</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— provider shape</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-sky\" href=\"https://github.com/AnEntrypoint/freddie/tree/master/plugins/gui-sessions\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">05</span>\n  <span class=\"title\" style=\"font-weight:600\">gui route plugin</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— dashboard route</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-green\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/plugins/core-cli/plugin.js\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">06</span>\n  <span class=\"title\" style=\"font-weight:600\">core-cli plugin</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— CLI is itself plugin-sourced</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n</section><section class=\"ds-section page-body\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\"><h2>one-shot writing template</h2>\n<pre>\n// plugins/my-thing/plugin.js\nexport default {\n    name: 'my-thing',\n    surfaces: 'pi',\n    requires: ['core-agent-machine'],\n    register({ pi, hooks, log, config }) {\n        pi.tools.register({\n            name: 'my_tool',\n            schema: { name: 'my_tool', description: '…', parameters: { type: 'object', properties: { x: { type: 'string' } }, required: ['x'] } },\n            handler: async ({ x }) =&gt; ({ ok: true, x }),\n        })\n        hooks.on('preToolCall', async (p) =&gt; { log.info('tool fired', { name: p.name }); return p })\n    },\n}\n</pre>\n<h2>boot the host yourself</h2>\n<pre>\nimport { bootHost } from 'freddie/src/host/index.js'\nconst host = await bootHost()\nconsole.log(host.plugins().length)         // 120+\nconsole.log(host.pi.tools.list().length)   // 70+\nconsole.log(host.gui.routes.list().length) // 30+\nawait host.pi.dispatchTool('bash', { command: 'echo hi', timeout_ms: 5000 })\n</pre>\n<h2>philosophy</h2>\n<ul>\n<li>one contract, one host, no compat shims.</li>\n<li>extension is a directory and a default export.</li>\n<li>surfaces guarded at load. cycles thrown synchronously. no silent fallbacks.</li>\n<li>every subsystem is liftable to its own npm package without changing the contract.</li>\n</ul></section>" }),
