<style>
.page-body h1 { margin-top: 0 }
.page-body h2 { margin-top: 32px }
.page-body h3 { margin-top: 24px }
.page-body pre { margin: 12px 0; background: var(--panel-2, #F0E9DA); padding: 12px; border-radius: 8px; overflow-x: auto }
.ds-hero { padding: 48px 28px 36px; background: var(--panel-1, #FBF6EB); border-radius: 20px; margin: 24px 0 }
.ds-hero-title { font-family: 'Archivo Black', sans-serif; font-size: clamp(40px, 6vw, 72px); margin: 0 0 16px; letter-spacing: -0.02em }
.ds-hero-body { font-size: 17px; line-height: 1.55; max-width: 64ch; opacity: 0.85 }
.ds-hero-accent { color: var(--mascot, #F07AA8); font-weight: 600 }
.ds-hero-badges { margin-top: 24px; display: flex; gap: 8px; flex-wrap: wrap }
.chip { padding: 6px 12px; border-radius: 6px; background: var(--panel-2, #F0E9DA); font-size: 13px }
.btn, .btn-primary { display: inline-block; padding: 10px 18px; border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 14px }
.btn { background: var(--panel-2, #F0E9DA); color: inherit }
.btn-primary { background: var(--ink, #1F1B16); color: var(--paper, #F5F0E4) }
.rail-green { box-shadow: inset 4px 0 0 var(--green, #3F8A4A) }
.rail-purple { box-shadow: inset 4px 0 0 var(--purple, #6B3A78) }
.rail-mascot { box-shadow: inset 4px 0 0 var(--mascot, #F07AA8) }
.rail-sun { box-shadow: inset 4px 0 0 var(--sun, #FFD86B) }
.rail-flame { box-shadow: inset 4px 0 0 var(--flame, #FF8454) }
.rail-sky { box-shadow: inset 4px 0 0 var(--sky, #6FA9FF) }
.dot-green { color: var(--green, #3F8A4A) } .dot-purple { color: var(--purple, #6B3A78) }
.dot-mascot { color: var(--mascot, #F07AA8) } .dot-sun { color: var(--sun, #FFD86B) }
.dot-flame { color: var(--flame, #FF8454) } .dot-sky { color: var(--sky, #6FA9FF) }
body { margin: 0 }
.app-stage { max-width: 1100px; margin: 0 auto; padding: 24px }

<body>
<div id="app"></div>
<script type="module">
import { mount, components as C } from 'anentrypoint-design';
const navItems = [["Home","/"],["Plugins","/plugins/"],["Architecture","/architecture/"],["CLI","/cli/"],["Tools","/tools/"],["Platforms","/platforms/"],["Skills","/skills/"],["Development","/development/"]];
mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: 'Freddie', items: navItems, active: "Architecture" }),
  crumb: C.Crumb({ leaf: "Architecture" }),
  main: C.h('div', { class: 'app-stage', innerHTML: "<div class=\"ds-hero\">\n  <h1 class=\"ds-hero-title\">architecture</h1>\n  <p class=\"ds-hero-body\">11 small subsystems, every one ≤200 lines, every one observable <span class=\"ds-hero-accent\">composition over framework. always.</span></p>\n  <p class=\"ds-hero-body\">freddie's architecture is a thin layer over published packages. each subsystem owns one concern, registers a `/debug/&lt;name&gt;` endpoint, emits structured logs, and is replaced by changing one file. nothing is private. nothing is magic.</p>\n  <div class=\"ds-hero-badges\"><span class=\"chip\"><strong>11</strong><span style=\"opacity:.7\"> subsystems</span></span> <span class=\"chip\"><strong>≤200L</strong><span style=\"opacity:.7\"> per file</span></span> <span class=\"chip\"><strong>xstate v5</strong><span style=\"opacity:.7\"> every long-lived machine</span></span></div>\n  <div class=\"ds-hero-ctas\" style=\"margin-top:16px;display:flex;gap:8px;flex-wrap:wrap\"><a class=\"btn-primary\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md\">AGENTS.md</a></div>\n</div><section class=\"ds-section rail-green\" id=\"when\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">when do you read this page?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">when you want to know where a behavior lives, or where to add one.</p>\n  <div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you're tracing a turn</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">agent loop → tool dispatch → session append → memory sync. follow the path through <code>src/agent/machine.js</code>.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">every transition is a named state. xstate makes the graph explicit.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you're adding a feature</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">this page tells you which subsystem owns it. add a tool? <code>src/tools/</code>. add a platform? <code>src/gateway/platforms/</code>. add a memory provider? <code>src/plugins/memory/</code>.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">no \"where does this go\" guessing.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you're debugging</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">every subsystem has <code>/debug/&lt;name&gt;</code> and a jsonl log. <code>tail</code> the log, hit the endpoint, read the state.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">incident → root cause in minutes, not hours.</div>\n</div>\n  \n</section>\n<section class=\"ds-section rail-purple\" id=\"agent-loop\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">agent loop</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">xstate v5 turn machine wraps `@mariozechner/pi-agent-core`'s `runAgentLoop`.</p>\n  <div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">machine</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/agent/machine.js</code> — turn choreography, tool dispatch, error recovery.</div>\n  \n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">llm bridge</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/agent/pi-bridge.js</code> — pi-ai provider adapter (anthropic/openai/groq/openrouter).</div>\n  \n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">resolver</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/agent/llm_resolver.js</code> — picks pi-bridge → acptoapi → throw, in priority order.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-mascot\" id=\"context-engine\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">context engine + compressor</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">builds the system message, prunes history when the budget is tight.</p>\n  <div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">builder</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/context/engine.js</code> — file context, skills, memory, tool descriptions composed into one message.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">compressor</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/agent/compress/</code> — head/middle/tail policy + handoff prompt + iterative updates.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">budget</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">token-aware. drops middle, preserves recent + handoff.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-sun\" id=\"tools\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">tool registry + environments</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">70+ tools auto-discovered. environments select where they run.</p>\n  <div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">registry</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/tools/registry.js</code> — register, dispatch, list.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">environments</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/tools/environments/{local,docker,ssh}.js</code> — one shape, three executors.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">toolsets</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/toolsets.js</code> — opt-in subsets (<code>core</code>, <code>browse</code>, <code>creative</code>).</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-flame\" id=\"gateway\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">gateway + platforms</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">16 adapters, one event hub.</p>\n  <div class=\"row rail-flame\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-flame\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">gateway</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/gateway/run.js</code> — adapter mounts + hooks chain + agent wiring.</div>\n  \n</div>\n<div class=\"row rail-flame\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-flame\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">adapters</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/gateway/platforms/*.js</code> — telegram, discord, slack, whatsapp, sms, email, matrix, signal, mattermost, zulip, dingtalk, feishu, wechat, wecom, qq, bluebubbles, hass, webhook, api_server.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-sky\" id=\"storage\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">storage + memory</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">sqlite for sessions + 8 plugin backends for memory.</p>\n  <div class=\"row rail-sky\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sky\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">sessions</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/sessions.js</code> — libsql + fts5 full-text search.</div>\n  \n</div>\n<div class=\"row rail-sky\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sky\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">memory tool</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/tools/memory.js</code> — routes to configured provider, falls back to local sqlite.</div>\n  \n</div>\n<div class=\"row rail-sky\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sky\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">providers</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/plugins/memory/{honcho,mem0,supermemory,byterover,hindsight,openviking,retaindb,holographic}.js</code>.</div>\n  \n</div>\n<div class=\"row rail-sky\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sky\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">auth</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/auth.js</code> — FileAuthStore for credential persistence (pi-ai compatible).</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-green\" id=\"skills\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">skills + commands</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">SKILL.md loader + slash command registry.</p>\n  <div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">loader</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/skills/index.js</code> — discovers <code>~/.freddie/skills/</code> and bundled tree.</div>\n  \n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">commands</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/commands/registry.js</code> — slash command definitions, gateway/telegram/slack views derived.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-purple\" id=\"dashboard\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">dashboard + acp</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">web ui (anentrypoint-design webjsx) and json-rpc stdio.</p>\n  <div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">dashboard server</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/web/server.js</code> — express + /api endpoints + SSE chat.</div>\n  \n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">dashboard app</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/web/app.js</code> — webjsx components, motion, live chat, file viewer.</div>\n  \n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">acp</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/acp/server.js</code> — json-rpc stdio for ide integration.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-mascot\" id=\"workflows\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">workflows</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">cron and batch turn freddie into an unattended worker.</p>\n  <div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">cron</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/cron/scheduler.js</code> — persistent jobs, in-process scheduler, async surface.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">batch</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/batch.js</code> — parallel prompt runner with bounded concurrency.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-sun\" id=\"observability\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">observability</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">every subsystem emits jsonl + registers `/debug/&lt;name&gt;`.</p>\n  <div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">logs</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/observability/log.js</code> — <code>{subsystem, severity, ts, fields}</code> rows under <code>~/.freddie/logs/</code>.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">debug registry</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/observability/debug.js</code> — <code>register(name, snapshotFn)</code> + <code>/api/debug</code> aggregator.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-flame\" id=\"home\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">home + profiles + config</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">profile-aware home, durable config with migrations.</p>\n  <div class=\"row rail-flame\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-flame\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">home</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/home.js</code> — <code>getFreddieHome()</code>, <code>applyProfileOverride()</code>, profile-safe paths.</div>\n  \n</div>\n<div class=\"row rail-flame\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-flame\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">config</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/config.js</code> — <code>loadConfig()</code>, <code>saveConfigValue()</code>, <code>_config_version</code> migrations.</div>\n  \n</div>\n<div class=\"row rail-flame\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-flame\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">skins</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>src/skin/engine.js</code> — built-in + user skins, hot-swap via <code>/skin &lt;name&gt;</code>.</div>\n  \n</div>\n  \n</section><section class=\"ds-section\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">explore</h2>\n  <a class=\"row rail-purple\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">01</span>\n  <span class=\"title\" style=\"font-weight:600\">AGENTS.md</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— full subsystem deep dives</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-mascot\" href=\"https://github.com/AnEntrypoint/freddie/tree/master/src\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">02</span>\n  <span class=\"title\" style=\"font-weight:600\">src tree</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— code itself</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-sun\" href=\"https://github.com/AnEntrypoint/freddie/blob/master/test.js\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">03</span>\n  <span class=\"title\" style=\"font-weight:600\">test.js</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— 200-line integration test</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n</section><section class=\"ds-section page-body\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\"><h2>conventions</h2>\n<ul>\n<li>one file = one concern; ≤200 lines, hard cap.</li>\n<li>no comments — naming carries the weight.</li>\n<li>real services in tests, no mocks.</li>\n<li>every subsystem registers <code>/debug/&lt;name&gt;</code> and emits structured logs.</li>\n<li>composed packages &gt; forks; xstate for every long-lived machine.</li>\n</ul>\n<h2>debugging</h2>\n<pre>\ncurl http://127.0.0.1:3000/api/debug\ncurl http://127.0.0.1:3000/api/debug/agent\ntail -f ~/.freddie/logs/agent.log\n</pre>\n<h2>further reading</h2>\n<ul>\n<li><a href=\"https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md\">AGENTS.md</a> — subsystem deep dive.</li>\n<li><a href=\"https://github.com/AnEntrypoint/freddie/blob/master/CHANGELOG.md\">CHANGELOG.md</a> — release history.</li>\n</ul></section>" }),
