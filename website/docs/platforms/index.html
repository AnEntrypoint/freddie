ia the webhook adapter."}]},{"id":"why","name":"why one gateway, not n bots?","lede":"every adapter is the same shape. the gateway is one express server with n adapter mounts.","features":[{"name":"one process, n surfaces","desc":"gateway boots once. each adapter mounts its routes (webhook) or starts its long-poll loop (telegram, matrix). all inbound messages route to one agent loop.","benefit":"one log, one config, one deploy. no fanout deployment headache."},{"name":"hooks for filtering and rate limits","desc":"per-platform hook chain runs before the agent sees a message. drop, transform, throttle, redact.","benefit":"spam control + abuse prevention without touching the agent code."},{"name":"outbound buffer","desc":"api_server adapter lets pull-based clients (mobile, embedded) poll for replies via `GET /messages`.","benefit":"works behind nat, no inbound port required."},{"name":"env-gated start","desc":"every adapter throws on `start()` if required credentials are absent. the gateway logs which adapters started, which were skipped.","benefit":"clear startup line shows you exactly what's live and what's missing."}]},{"id":"how-to-add","name":"how do I add a platform?","lede":"create `plugins/platform-\u003cname>/{plugin,handler}.js` — a class ending in `Adapter` plus `pi.platforms.register`.","features":[{"name":"1 — extend EventEmitter","desc":"in `handler.js`, `export class MynameAdapter extends EventEmitter`. the class name MUST end in `Adapter` so the gateway resolves it."},{"name":"2 — declare credentials","desc":"`getRequiredEnv() { return ['MY_TOKEN'] }`"},{"name":"3 — implement lifecycle","desc":"`async start()`, `async stop()`, `async send(recipient, content)`"},{"name":"4 — emit messages","desc":"`this.emit('message', { recipient, content, raw })` on inbound"},{"name":"5 — register the plugin","desc":"`plugin.js` default-exports `{ name: 'platform-myname', surfaces: 'pi', register({ pi }) { pi.platforms.register({ name: 'myname', module }) } }`."}]}],"examples":[{"label":"platform plugins","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins","desc":"every platform-* adapter"},{"label":"telegram adapter","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/platform-telegram","desc":"long-poll example"},{"label":"webhook adapter","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/platform-webhook","desc":"catch-all"}],"bodyHtml":"\u003ch2>starting the gateway\u003c/h2>\n\u003cpre>\nexport TELEGRAM_BOT_TOKEN=&lt;token&gt;\nexport DISCORD_BOT_TOKEN=&lt;token&gt;\nnode bin/freddie.js gateway --port 3001\n\u003c/pre>\n\u003cp>the gateway logs which adapters lit up and which stayed dark for missing credentials.\u003c/p>\n\u003ch2>inspecting required env per adapter\u003c/h2>\n\u003cpre>\nimport { TelegramAdapter } from './plugins/platform-telegram/handler.js'\nnew TelegramAdapter({}).getRequiredEnv()\n// ['TELEGRAM_BOT_TOKEN']\n\u003c/pre>\n\u003ch2>hooks\u003c/h2>\n\u003cp>install hooks via \u003ccode>gateway.use(fn)\u003c/code>. each hook is \u003ccode>async (msg, next) =&gt; ...\u003c/code> and can drop, mutate, or throttle before the agent sees the message.\u003c/p>"}</script>

<div id="app"></div>
<script type="module">
import { mount, components as C, h } from 'anentrypoint-design';
const data = JSON.parse(document.getElementById('__site__').textContent);
const RAILS = ['rail-green', 'rail-purple', 'rail-mascot', 'rail-sun', 'rail-flame', 'rail-sky'];

function heroNode(hero) {
  if (!hero) return null;
  const badges = Array.isArray(hero.badges) ? hero.badges.filter(Boolean) : [];
  const badgeRow = badges.length
    ? h('div', { class: 'ds-hero-stats' }, ...badges.map((b, i) =>
        h('span', { key: i, class: 'ds-hero-stat' },
          h('strong', { class: 'ds-hero-stat-n' }, String(b.label != null ? b.label : b)),
          b.desc ? h('span', { class: 'ds-hero-stat-l' }, String(b.desc)) : null,
        )))
    : null;
  return h('div', { class: 'ds-hero' },
    hero.eyebrow ? h('span', { class: 'eyebrow' }, hero.eyebrow) : null,
    h('h1', { class: 'ds-hero-title' }, hero.heading || hero.title || data.title),
    (hero.body || hero.subheading) ? h('p', { class: 'ds-hero-body' },
      hero.body || hero.subheading,
      hero.accent ? h('span', { class: 'ds-hero-accent' }, ' ' + hero.accent) : null,
    ) : null,
    Array.isArray(hero.ctas) && hero.ctas.length
      ? h('div', { class: 'ds-hero-actions' }, ...hero.ctas.map((c, i) =>
          h('a', { key: i, class: i === 0 ? 'btn btn-accent' : 'btn btn-ghost', href: c.href || '#' }, c.label || c.cta || 'go')))
      : null,
    badgeRow,
  );
}

function sectionNode(sec, idx) {
  const rail = RAILS[idx % RAILS.length];
  const features = sec.features || sec.items || [];
  const rows = features.map((f, i) => {
    const kids = [h('div', { key: 't', class: 'ds-feature-title' }, String(f.name || ''))];
    if (f.desc) kids.push(h('div', { key: 'd', class: 'ds-feature-desc', innerHTML: String(f.desc).replace(/`([^`]+)`/g, '<code>$1</code>') }));
    if (f.benefit) kids.push(h('div', { key: 'b', class: 'ds-feature-benefit' }, String(f.benefit)));
    return h('div', { key: i, class: 'ds-feature ' + rail }, ...kids);
  });
  return C.Section({
    title: sec.name || sec.title || sec.id,
    children: [
      sec.lede ? h('p', { class: 'ds-lede' }, sec.lede) : null,
      ...rows,
      sec.body && sec.body.length >= 240 ? h('div', { class: 'page-body', innerHTML: __md(sec.body) }) : null,
    ].filter(Boolean),
  });
}

function examplesNode(examples) {
  if (!examples || !examples.length) return null;
  return C.Section({
    title: 'explore',
    children: examples.map((e, i) => {
      const rail = RAILS[(i + 1) % RAILS.length];
      const kids = [
        h('span', { key: 'c', class: 'code' }, String(i + 1).padStart(2, '0')),
        h('span', { key: 't', class: 'title' }, String(e.label || e.name || e.href || '')),
      ];
      if (e.desc) kids.push(h('span', { key: 'm', class: 'meta dim' }, ' — ' + e.desc));
      kids.push(h('span', { key: 'a', class: 'ds-row-arrow' }, '->'));
      return h('a', { key: i, class: 'row ' + rail, href: e.href || '#' }, ...kids);
    }),
  });
}

// minimal client-side markdown renderer matching server-side renderer (idempotent for already-html bodies)
function __md(md) {
  const lines = String(md || '').split('\n');
  const out = []; let inCode = false, inList = false;
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = (s) => s.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  for (const line of lines) {
    if (line.startsWith('```')) { if (inCode) { out.push('</pre>'); inCode = false; } else { out.push('<pre>'); inCode = true; } continue; }
    if (inCode) { out.push(esc(line)); continue; }
    if (line.startsWith('# ')) out.push('<h1>' + esc(line.slice(2)) + '</h1>');
    else if (line.startsWith('## ')) out.push('<h2>' + esc(line.slice(3)) + '</h2>');
    else if (line.startsWith('### ')) out.push('<h3>' + esc(line.slice(4)) + '</h3>');
    else if (line.startsWith('- ')) { if (!inList) { out.push('<ul>'); inList = true; } out.push('<li>' + inl(esc(line.slice(2))) + '</li>'); }
    else { if (inList) { out.push('</ul>'); inList = false; } if (line.trim()) out.push('<p>' + inl(esc(line)) + '</p>'); }
  }
  if (inList) out.push('</ul>');
  if (inCode) out.push('</pre>');
  return out.join('\n');
}

const bodyNode = data.bodyHtml ? C.Section({ children: h('div', { class: 'page-body', innerHTML: data.bodyHtml }) }) : null;

const mainChildren = [
  heroNode(data.hero),
  ...data.sections.map(sectionNode),
  examplesNode(data.examples),
  bodyNode,
].filter(Boolean);

mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: data.siteName, items: data.navItems, active: data.title }),
  crumb: C.Crumb({ leaf: data.title }),
  main: h('div', { class: 'app-stage' }, ...mainChildren),
  status: C.Status({ left: [data.siteName.toLowerCase(), data.slug], right: ['live'] }),
}));
</script>
</body>
