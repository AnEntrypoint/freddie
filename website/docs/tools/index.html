 web_extract, browser (puppeteer-core), url_safety, website_policy.","benefit":"research with rate limits and url-safety baked in, not an afterthought."},{"name":"media + voice","desc":"image_gen, vision, tts, transcription, voice_mode, neutts_synth.","benefit":"full multimodal turn — see an image, generate one, listen, speak."},{"name":"orchestration","desc":"delegate (sub-agent spawn with depth guard), mixture_of_agents, cronjob, send_message.","benefit":"parallelize work and schedule it, without leaving the agent loop."},{"name":"safety + policy","desc":"path_security, schema_sanitizer, skills_guard, tirith_security, tool_output_limits, osv_check.","benefit":"prevents `rm -rf /`, fork bombs, prototype pollution, oversized outputs, and known-vulnerable deps."},{"name":"skills + extensions","desc":"skill, skill_manager, skills_index, skills_sync, skills_hub, skill_usage, mcp_tool, swe_bench.","benefit":"every SKILL.md becomes a callable, every MCP server becomes a tool, every benchmark becomes a target."}]},{"id":"why","name":"why this design over a tool framework?","lede":"tools in freddie are plain functions registered against a json schema. zero abstraction, zero ceremony.","features":[{"name":"drop-in registration","desc":"a plugin calls `pi.tools.register({ name, schema, handler })` and the tool is live. auto-discovered on `bootHost()` from `plugins/\u003cname>/plugin.js`.","benefit":"one folder = one plugin. no decorators, no inheritance, no central registry to edit."},{"name":"schema is the contract","desc":"every tool exposes a json schema (openai/anthropic compatible). the agent sees only the schema; the handler receives the typed args.","benefit":"works with every llm tool-calling api unchanged."},{"name":"env-gated by checkFn","desc":"optional `checkFn()` predicate decides whether the tool is registered at all (e.g. only if `OPENAI_API_KEY` is set).","benefit":"missing creds -> tool quietly disappears, agent never tries to call it and fail."},{"name":"environments are pluggable","desc":"tools that exec code can run in local subprocess, docker, or ssh — selected by `src/tools/environments/index.js`.","benefit":"same `bash` tool, runs on the host or in a container, transparent to the agent."}]},{"id":"how-to-add","name":"how do I add my own tool?","lede":"create `plugins/\u003cname>/{plugin,handler}.js` and it's live next boot.","features":[{"name":"1 — write the handler","desc":"`handler.js` exports `_tool = { name, toolset, schema, handler, checkFn?, requiresEnv? }`. for multi-tool files export `_tool0`, `_tool1`, …"},{"name":"2 — declare a json schema","desc":"name, description, parameters (object with properties + required). this is what the llm sees."},{"name":"3 — register in plugin.js","desc":"default-export `{ name, surfaces: 'pi', register({ pi }) { pi.tools.register(_tool) } }`."},{"name":"4 — gate optional deps","desc":"add `requiresEnv: ['MY_KEY']` and `checkFn: () => !!process.env.MY_KEY` so the tool self-disables when unconfigured."},{"name":"5 — restart freddie","desc":"`bootHost()` discovers the plugin automatically. `freddie tools` shows the new entry."}]}],"examples":[{"label":"bash plugin","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/bash","desc":"simple example"},{"label":"browser plugin","href":"https://github.com/AnEntrypoint/freddie/tree/master/plugins/browser","desc":"lazy-loaded example"},{"label":"host + discovery","href":"https://github.com/AnEntrypoint/freddie/blob/master/src/host/host.js","desc":"how plugins load"},{"label":"AGENTS.md","href":"https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md","desc":"full plugin contract"}],"bodyHtml":"\u003ch2>adding a tool — full example\u003c/h2>\n\u003cpre>\n// plugins/my-tool/handler.js\nexport const _tool = {\n    name: 'my_tool',\n    toolset: 'core',\n    schema: {\n        name: 'my_tool',\n        description: 'Do the thing',\n        parameters: {\n            type: 'object',\n            properties: { x: { type: 'string' } },\n            required: ['x'],\n        },\n    },\n    handler: async (args, ctx) =&gt; ({ ok: true, x: args.x }),\n    checkFn: () =&gt; !!process.env.MY_KEY,\n    requiresEnv: ['MY_KEY'],\n}\n\n// plugins/my-tool/plugin.js\nimport { _tool } from './handler.js'\nexport default {\n    name: 'my-tool',\n    surfaces: 'pi',\n    register({ pi }) { pi.tools.register(_tool) },\n}\n\u003c/pre>\n\u003cp>drop the folder in \u003ccode>plugins/\u003c/code>. auto-discovered on next \u003ccode>bootHost()\u003c/code>.\u003c/p>\n\u003ch2>listing tools\u003c/h2>\n\u003cpre>\nnode bin/freddie.js tools\n\u003c/pre>\n\u003cp>prints \u003ccode>&lt;toolset&gt; &lt;name&gt; &lt;description&gt;\u003c/code> for every registered tool, including ones gated off by missing env.\u003c/p>\n\u003ch2>toolsets\u003c/h2>\n\u003cp>toolsets group tools so a profile can opt in to a subset. defaults: \u003ccode>core\u003c/code>, \u003ccode>browse\u003c/code>, \u003ccode>creative\u003c/code>. configure via \u003ccode>~/.freddie/config.json\u003c/code> -&gt; \u003ccode>toolsets: ['core']\u003c/code>.\u003c/p>"}</script>

<body>
<div id="app"></div>
<script type="module">
import { mount, components as C, h } from 'anentrypoint-design';
const data = JSON.parse(document.getElementById('__site__').textContent);
const RAILS = ['rail-green', 'rail-purple', 'rail-mascot', 'rail-sun', 'rail-flame', 'rail-sky'];

function heroNode(hero) {
  if (!hero) return null;
  const badges = Array.isArray(hero.badges) ? hero.badges.filter(Boolean) : [];
  const badgeRow = badges.length
    ? h('div', { class: 'ds-hero-stats' }, ...badges.map((b, i) =>
        h('span', { key: i, class: 'ds-hero-stat' },
          h('strong', { class: 'ds-hero-stat-n' }, String(b.label != null ? b.label : b)),
          b.desc ? h('span', { class: 'ds-hero-stat-l' }, String(b.desc)) : null,
        )))
    : null;
  return h('div', { class: 'ds-hero' },
    hero.eyebrow ? h('span', { class: 'eyebrow' }, hero.eyebrow) : null,
    h('h1', { class: 'ds-hero-title' }, hero.heading || hero.title || data.title),
    (hero.body || hero.subheading) ? h('p', { class: 'ds-hero-body' },
      hero.body || hero.subheading,
      hero.accent ? h('span', { class: 'ds-hero-accent' }, ' ' + hero.accent) : null,
    ) : null,
    Array.isArray(hero.ctas) && hero.ctas.length
      ? h('div', { class: 'ds-hero-actions' }, ...hero.ctas.map((c, i) =>
          h('a', { key: i, class: i === 0 ? 'btn btn-accent' : 'btn btn-ghost', href: c.href || '#' }, c.label || c.cta || 'go')))
      : null,
    badgeRow,
  );
}

function sectionNode(sec, idx) {
  const rail = RAILS[idx % RAILS.length];
  const features = sec.features || sec.items || [];
  const rows = features.map((f, i) => {
    const kids = [h('div', { key: 't', class: 'ds-feature-title' }, String(f.name || ''))];
    if (f.desc) kids.push(h('div', { key: 'd', class: 'ds-feature-desc', innerHTML: String(f.desc).replace(/`([^`]+)`/g, '<code>$1</code>') }));
    if (f.benefit) kids.push(h('div', { key: 'b', class: 'ds-feature-benefit' }, String(f.benefit)));
    return h('div', { key: i, class: 'ds-feature ' + rail }, ...kids);
  });
  return C.Section({
    title: sec.name || sec.title || sec.id,
    children: [
      sec.lede ? h('p', { class: 'ds-lede' }, sec.lede) : null,
      ...rows,
      sec.body && sec.body.length >= 240 ? h('div', { class: 'page-body', innerHTML: __md(sec.body) }) : null,
    ].filter(Boolean),
  });
}

function examplesNode(examples) {
  if (!examples || !examples.length) return null;
  return C.Section({
    title: 'explore',
    children: examples.map((e, i) => {
      const rail = RAILS[(i + 1) % RAILS.length];
      const kids = [
        h('span', { key: 'c', class: 'code' }, String(i + 1).padStart(2, '0')),
        h('span', { key: 't', class: 'title' }, String(e.label || e.name || e.href || '')),
      ];
      if (e.desc) kids.push(h('span', { key: 'm', class: 'meta dim' }, ' — ' + e.desc));
      kids.push(h('span', { key: 'a', class: 'ds-row-arrow' }, '->'));
      return h('a', { key: i, class: 'row ' + rail, href: e.href || '#' }, ...kids);
    }),
  });
}

// minimal client-side markdown renderer matching server-side renderer (idempotent for already-html bodies)
function __md(md) {
  const lines = String(md || '').split('\n');
  const out = []; let inCode = false, inList = false;
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = (s) => s.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  for (const line of lines) {
    if (line.startsWith('```')) { if (inCode) { out.push('</pre>'); inCode = false; } else { out.push('<pre>'); inCode = true; } continue; }
    if (inCode) { out.push(esc(line)); continue; }
    if (line.startsWith('# ')) out.push('<h1>' + esc(line.slice(2)) + '</h1>');
    else if (line.startsWith('## ')) out.push('<h2>' + esc(line.slice(3)) + '</h2>');
    else if (line.startsWith('### ')) out.push('<h3>' + esc(line.slice(4)) + '</h3>');
    else if (line.startsWith('- ')) { if (!inList) { out.push('<ul>'); inList = true; } out.push('<li>' + inl(esc(line.slice(2))) + '</li>'); }
    else { if (inList) { out.push('</ul>'); inList = false; } if (line.trim()) out.push('<p>' + inl(esc(line)) + '</p>'); }
  }
  if (inList) out.push('</ul>');
  if (inCode) out.push('</pre>');
  return out.join('\n');
}

const bodyNode = data.bodyHtml ? C.Section({ children: h('div', { class: 'page-body', innerHTML: data.bodyHtml }) }) : null;

const mainChildren = [
  heroNode(data.hero),
  ...data.sections.map(sectionNode),
  examplesNode(data.examples),
  bodyNode,
].filter(Boolean);

mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: data.siteName, items: data.navItems, active: data.title }),
  crumb: C.Crumb({ leaf: data.title }),
  main: h('div', { class: 'app-stage' }, ...mainChildren),
  status: C.Status({ left: [data.siteName.toLowerCase(), data.slug], right: ['live'] }),
}));
</script>
</body>
