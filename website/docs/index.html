<!doctype html>

<title>Freddie — Freddie</title>
<link rel="stylesheet" href="https://unpkg.com/anentrypoint-design@latest/dist/247420.css">
<script type="importmap">
{ "imports": { "anentrypoint-design": "https://unpkg.com/anentrypoint-design@latest/dist/247420.js" } }
</script>
<style>
.page-body h1 { margin-top: 0 }
.page-body h2 { margin-top: 32px }
.page-body h3 { margin-top: 24px }
.page-body pre { margin: 12px 0; background: var(--panel-2, #F0E9DA); padding: 12px; border-radius: 8px; overflow-x: auto }
.ds-hero { padding: 48px 28px 36px; background: var(--panel-1, #FBF6EB); border-radius: 20px; margin: 24px 0 }
.ds-hero-title { font-family: 'Archivo Black', sans-serif; font-size: clamp(40px, 6vw, 72px); margin: 0 0 16px; letter-spacing: -0.02em }
.ds-hero-body { font-size: 17px; line-height: 1.55; max-width: 64ch; opacity: 0.85 }
.ds-hero-accent { color: var(--mascot, #F07AA8); font-weight: 600 }
.ds-hero-badges { margin-top: 24px; display: flex; gap: 8px; flex-wrap: wrap }
.chip { padding: 6px 12px; border-radius: 6px; background: var(--panel-2, #F0E9DA); font-size: 13px }
.btn, .btn-primary { display: inline-block; padding: 10px 18px; border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 14px }
.btn { background: var(--panel-2, #F0E9DA); color: inherit }
.btn-primary { background: var(--ink, #1F1B16); color: var(--paper, #F5F0E4) }
.rail-green { box-shadow: inset 4px 0 0 var(--green, #3F8A4A) }
.rail-purple { box-shadow: inset 4px 0 0 var(--purple, #6B3A78) }
.rail-mascot { box-shadow: inset 4px 0 0 var(--mascot, #F07AA8) }
.rail-sun { box-shadow: inset 4px 0 0 var(--sun, #FFD86B) }
.rail-flame { box-shadow: inset 4px 0 0 var(--flame, #FF8454) }
.rail-sky { box-shadow: inset 4px 0 0 var(--sky, #6FA9FF) }
.dot-green { color: var(--green, #3F8A4A) } .dot-purple { color: var(--purple, #6B3A78) }
.dot-mascot { color: var(--mascot, #F07AA8) } .dot-sun { color: var(--sun, #FFD86B) }
.dot-flame { color: var(--flame, #FF8454) } .dot-sky { color: var(--sky, #6FA9FF) }
body { margin: 0 }
.app-stage { max-width: 1100px; margin: 0 auto; padding: 24px }
</style>

<body>
<div id="app"></div>
<script type="module">
import { mount, components as C } from 'anentrypoint-design';
const navItems = [["Home","/"],["Plugins","/plugins/"],["Architecture","/architecture/"],["CLI","/cli/"],["Tools","/tools/"],["Platforms","/platforms/"],["Skills","/skills/"],["Development","/development/"]];
mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: 'Freddie', items: navItems, active: "Freddie" }),
  crumb: C.Crumb({ leaf: "Freddie" }),
  main: C.h('div', { class: 'app-stage', innerHTML: "<div class=\"ds-hero\">\n  <h1 class=\"ds-hero-title\">freddie</h1>\n  <p class=\"ds-hero-body\">an open js agent harness — multi-platform, multi-tool, multi-memory <span class=\"ds-hero-accent\">built so you own the loop, not the vendor.</span></p>\n  <p class=\"ds-hero-body\">spin up an agent that lives in your terminal, your dashboard, telegram, slack, discord, sms, signal, matrix, whatsapp, email, and a dozen more. swap the model. swap the memory backend. extend with skills. all from one config tree, no rewrites.</p>\n  <div class=\"ds-hero-badges\"><span class=\"chip\"><strong>12/12</strong><span style=\"opacity:.7\"> integration groups green</span></span> <span class=\"chip\"><strong>70+</strong><span style=\"opacity:.7\"> built-in tools</span></span> <span class=\"chip\"><strong>16</strong><span style=\"opacity:.7\"> gateway platforms</span></span> <span class=\"chip\"><strong>8</strong><span style=\"opacity:.7\"> memory backends</span></span> <span class=\"chip\"><strong>JS</strong><span style=\"opacity:.7\"> no python</span></span></div>\n  <div class=\"ds-hero-ctas\" style=\"margin-top:16px;display:flex;gap:8px;flex-wrap:wrap\"><a class=\"btn-primary\" href=\"#quick-start\">get started</a><a class=\"btn\" href=\"/architecture/\">architecture</a><a class=\"btn\" href=\"https://github.com/AnEntrypoint/freddie\">github</a></div>\n</div><section class=\"ds-section rail-green\" id=\"when\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">when do I reach for freddie?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">pick freddie when you need an agent that goes where your users are, not where the vendor's chat box lives.</p>\n  <div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you want one agent across many surfaces</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">terminal repl, web dashboard, telegram bot, discord bot, slack app, sms, email — same brain, same tools, same memory, one process to run.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">stop building three half-finished bots. one config, one loop, n adapters.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you want to own the model layer</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">anthropic, openai, groq, openrouter, gemini, ollama, bedrock, kilo, opencode, claude-cli — pi-ai routes them all, freddie wraps them in xstate.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">vendor down → switch model in config, not in code.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you want memory that survives sessions</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">8 provider backends (honcho, mem0, supermemory, byterover, hindsight, openviking, retaindb, holographic) plus a sqlite fts5 fallback.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">agent remembers a user across conversations without you wiring redis yourself.</div>\n</div>\n<div class=\"row rail-green\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-green\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">you want to ship without a stack</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">pure node. no python, no docker, no kubernetes. <code>npm install</code> and you have a dashboard, a cron, a gateway, an acp server, and a cli.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">a $5 vps runs your full agent surface.</div>\n</div>\n  \n</section>\n<section class=\"ds-section rail-purple\" id=\"why\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">why this over the alternatives?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">most agent harnesses give you a chat box. freddie gives you a substrate.</p>\n  <div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">substrate-first, not framework-first</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">pi-coding-agent (loop), pi-ai (providers), pi-tui (terminal), floosie (gateway xstate), anentrypoint-design (dashboard), xstate v5. we compose published packages, we don't fork them.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">when upstream ships a fix, you get it. no fork to maintain.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">real services, real tests</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">one <code>test.js</code> at the root, ≤200 lines, no mocks, no fixtures. exercises real sqlite, real express, real cron, real adapters. 12 named groups cover the whole surface.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">green test = green production. no \"works in mock\" failure mode.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">every subsystem is observed</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">structured jsonl logs (<code>subsystem, severity, ts</code>) under <code>~/.freddie/logs/</code>. <code>/api/debug</code> for live introspection. <code>window.__debug</code> registry in the dashboard.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">when a turn goes weird, the answer is one tail away — never a print-statement scramble.</div>\n</div>\n<div class=\"row rail-purple\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-purple\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">profile-safe by default</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>FREDDIE_PROFILE=alice</code> gives alice her own home, sessions, sqlite, auth, config — same binary, isolated state.</div>\n  <div class=\"row-benefit\" style=\"opacity:.75;margin-top:4px;font-style:italic\">ship a multi-tenant agent on day one, no rewrites.</div>\n</div>\n  \n</section>\n<section class=\"ds-section rail-mascot\" id=\"how\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">how do I start?</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">three commands gets you a working agent. five minutes gets you a dashboard you can chat with.</p>\n  <div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">1 — install</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>npm install</code> in the repo, or <code>npm install -g freddie</code> for a global cli. no native deps, no pythons, no rust toolchain.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">2 — pick a model</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">set <code>ANTHROPIC_API_KEY</code> (or <code>OPENAI_API_KEY</code>, <code>GROQ_API_KEY</code>, <code>OPENROUTER_API_KEY</code>). pi-ai picks the first one it sees. no model? freddie falls back to the local acptoapi bridge.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">3 — run</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>node bin/freddie.js run</code> for the repl. or <code>node bin/freddie.js dashboard --port 3000</code> for the web ui. or <code>node bin/freddie.js gateway --port 3001</code> to start the messaging bridge.</div>\n  \n</div>\n<div class=\"row rail-mascot\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-mascot\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">4 — extend</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">drop a tool in <code>src/tools/</code> (auto-discovered). drop a SKILL.md in <code>~/.freddie/skills/</code>. add a platform in <code>src/gateway/platforms/</code>. configure a cron with <code>freddie cron add '0 9 * * *' '&lt;prompt&gt;'</code>.</div>\n  \n</div>\n  \n</section>\n<section class=\"ds-section rail-sun\" id=\"substrate\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">substrate (the things we don't reimplement)</h2>\n  <p class=\"ds-lede\" style=\"opacity:.8;max-width:60ch\">every named dependency below is a published package we treat as a black box. when you run freddie, you're running the union of these.</p>\n  <div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">@mariozechner/pi-coding-agent</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">agent loop, tool dispatch, interactive tui, file auth store, extension runner.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">@mariozechner/pi-ai</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">provider layer. <code>complete</code>, streaming, cost calc, registerApiProvider, getModel.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">@mariozechner/pi-agent-core</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\"><code>agentLoop</code>, <code>runAgentLoop</code>, <code>streamProxy</code>. wrapped by xstate, never rewritten.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">floosie</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">gateway pipeline as an xstate ProcessorMachine. compose, don't fork.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">anentrypoint-design</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">webjsx + ripple-ui design system. dashboard ships with hero, panel, row, chat, file viewer, cron monitor primitives baked in.</div>\n  \n</div>\n<div class=\"row rail-sun\" style=\"border-radius:10px;margin:6px 0;padding:10px 14px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"dot dot-sun\" style=\"display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:currentColor;opacity:.8\" aria-hidden=\"true\"></span>\n  <span class=\"title\" style=\"font-weight:600\">xstate v5</span>\n  <div class=\"sub\" style=\"opacity:.85;margin-top:4px\">every long-lived machine — turns, gateways, approvals, compressor — is a real state machine, not a soup of booleans.</div>\n  \n</div>\n  \n</section><section class=\"ds-section\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\">\n  <h2 class=\"ds-section-title\" style=\"margin-top:0\">explore</h2>\n  <a class=\"row rail-purple\" href=\"/architecture/\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">01</span>\n  <span class=\"title\" style=\"font-weight:600\">architecture</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— subsystem deep dive</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-mascot\" href=\"/cli/\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">02</span>\n  <span class=\"title\" style=\"font-weight:600\">cli</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— every command</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-sun\" href=\"/tools/\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">03</span>\n  <span class=\"title\" style=\"font-weight:600\">tools</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— what the agent can do</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-flame\" href=\"/platforms/\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">04</span>\n  <span class=\"title\" style=\"font-weight:600\">platforms</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— every gateway adapter</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-sky\" href=\"/skills/\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">05</span>\n  <span class=\"title\" style=\"font-weight:600\">skills</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— bundled + how to write your own</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n<a class=\"row rail-green\" href=\"/development/\" style=\"display:block;text-decoration:none;color:inherit;padding:10px 14px;margin:6px 0;border-radius:10px;background:var(--panel-2,#F0E9DA)\">\n  <span class=\"code\" style=\"font-family:'JetBrains Mono',monospace;opacity:.6;margin-right:12px\">06</span>\n  <span class=\"title\" style=\"font-weight:600\">development</span>\n  <span class=\"meta\" style=\"opacity:.7;margin-left:8px\">— tests</span>\n  <span style=\"float:right;opacity:.5\">↗</span>\n</a>\n</section><section class=\"ds-section page-body\" style=\"margin:32px 0;padding:18px 22px;background:var(--panel-1,#FBF6EB);border-radius:20px\"><h2>quick-start</h2>\n<pre>\ngit clone https://github.com/AnEntrypoint/freddie\ncd freddie &amp;&amp; npm install\nexport ANTHROPIC_API_KEY=sk-ant-...\nnode bin/freddie.js run\nnode bin/freddie.js dashboard --port 3000\nnode bin/freddie.js gateway --port 3001\n</pre>\n<h2>what you get out of the box</h2>\n<ul>\n<li><strong>a repl</strong> that talks to any major LLM, with tool dispatch, slash commands, sessions, FTS search, skill loading.</li>\n<li><strong>a dashboard</strong> — chat, sessions, analytics, cron, batch, tools, models, skills, logs, config, env, gateway monitor.</li>\n<li><strong>a gateway</strong> that bridges 16 messaging platforms to one agent loop.</li>\n<li><strong>an acp server</strong> (json-rpc stdio) for ide integration.</li>\n<li><strong>a cron scheduler</strong> + <strong>batch runner</strong> for unattended workflows.</li>\n<li><strong>a memory layer</strong> with 8 provider backends + a local sqlite fts5 fallback.</li>\n<li><strong>a skills loader</strong> that picks up SKILL.md files from <code>~/.freddie/skills/</code> and the bundled tree.</li>\n</ul>\n<h2>philosophy</h2>\n<ul>\n<li>one file, one concern, ≤200 lines.</li>\n<li>no comments — naming carries the weight.</li>\n<li>real tests against real services, no mocks.</li>\n<li>every subsystem registers <code>/debug/&lt;name&gt;</code> and emits structured logs.</li>\n<li>we compose published packages; we don't maintain forks.</li>\n</ul></section>" }),
  status: C.Status({ left: ['freddie', "home"], right: ['live'] })
}));
</script>
</body>
</html>
