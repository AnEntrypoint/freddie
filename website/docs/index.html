"8 provider backends (honcho, mem0, supermemory, byterover, hindsight, openviking, retaindb, holographic) plus a sqlite fts5 fallback.","benefit":"agent remembers a user across conversations without you wiring redis yourself."},{"name":"you want to ship without a stack","desc":"pure node. no python, no docker, no kubernetes. `npm install` and you have a dashboard, a cron, a gateway, an acp server, and a cli.","benefit":"a $5 vps runs your full agent surface."}]},{"id":"why","name":"why this over the alternatives?","lede":"most agent harnesses give you a chat box. freddie gives you a substrate.","features":[{"name":"substrate-first, not framework-first","desc":"pi-coding-agent (loop), pi-ai (providers), pi-tui (terminal), floosie (gateway xstate), anentrypoint-design (dashboard), xstate v5. we compose published packages, we don't fork them.","benefit":"when upstream ships a fix, you get it. no fork to maintain."},{"name":"real services, real tests","desc":"one `test.js` at the root, ≤200 lines, no mocks, no fixtures. exercises real sqlite, real express, real cron, real adapters. 12 named groups cover the whole surface.","benefit":"green test = green production. no \"works in mock\" failure mode."},{"name":"every subsystem is observed","desc":"structured jsonl logs (`subsystem, severity, ts`) under `~/.freddie/logs/`. `/api/debug` for live introspection. `window.__debug` registry in the dashboard.","benefit":"when a turn goes weird, the answer is one tail away — never a print-statement scramble."},{"name":"profile-safe by default","desc":"`FREDDIE_PROFILE=alice` gives alice her own home, sessions, sqlite, auth, config — same binary, isolated state.","benefit":"ship a multi-tenant agent on day one, no rewrites."}]},{"id":"how","name":"how do I start?","lede":"three commands gets you a working agent. five minutes gets you a dashboard you can chat with.","features":[{"name":"1 — install","desc":"`npm install` in the repo, or `npm install -g freddie` for a global cli. no ateway adapter"},{"label":"skills","href":"/skills/","desc":"bundled + how to write your own"},{"label":"development","href":"/development/","desc":"tests, layout, how to contribute"}],"bodyHtml":"\u003ch2>quick-start\u003c/h2>\n\u003cpre>\ngit clone https://github.com/AnEntrypoint/freddie\ncd freddie &amp;&amp; npm install\nexport ANTHROPIC_API_KEY=sk-ant-...\nnode bin/freddie.js run\nnode bin/freddie.js dashboard --port 3000\nnode bin/freddie.js gateway --port 3001\n\u003c/pre>\n\u003ch2>what you get out of the box\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>a repl\u003c/strong> that talks to any major LLM, with tool dispatch, slash commands, sessions, FTS search, skill loading.\u003c/li>\n\u003cli>\u003cstrong>a dashboard\u003c/strong> — chat, sessions, analytics, cron, batch, tools, models, skills, logs, config, env, gateway monitor.\u003c/li>\n\u003cli>\u003cstrong>a gateway\u003c/strong> that bridges 16 messaging platforms to one agent loop.\u003c/li>\n\u003cli>\u003cstrong>an acp server\u003c/strong> (json-rpc stdio) for ide integration.\u003c/li>\n\u003cli>\u003cstrong>a cron scheduler\u003c/strong> + \u003cstrong>batch runner\u003c/strong> for unattended workflows.\u003c/li>\n\u003cli>\u003cstrong>a memory layer\u003c/strong> with 8 provider backends + a local sqlite fts5 fallback.\u003c/li>\n\u003cli>\u003cstrong>a skills loader\u003c/strong> that picks up SKILL.md files from \u003ccode>~/.freddie/skills/\u003c/code> and the bundled tree.\u003c/li>\n\u003c/ul>\n\u003ch2>philosophy\u003c/h2>\n\u003cul>\n\u003cli>one file, one concern, ≤200 lines.\u003c/li>\n\u003cli>no comments — naming carries the weight.\u003c/li>\n\u003cli>real tests against real services, no mocks.\u003c/li>\n\u003cli>every subsystem registers \u003ccode>/debug/&lt;name&gt;\u003c/code> and emits structured logs.\u003c/li>\n\u003cli>we compose published packages; we don't maintain forks.\u003c/li>\n\u003c/ul>"}</script>

<body>
<div id="app"></div>
<script type="module">
import { mount, components as C, h } from 'anentrypoint-design';
const data = JSON.parse(document.getElementById('__site__').textContent);
const RAILS = ['rail-green', 'rail-purple', 'rail-mascot', 'rail-sun', 'rail-flame', 'rail-sky'];

function heroNode(hero) {
  if (!hero) return null;
  const badges = Array.isArray(hero.badges) ? hero.badges.filter(Boolean) : [];
  const badgeRow = badges.length
    ? h('div', { class: 'ds-hero-stats' }, ...badges.map((b, i) =>
        h('span', { key: i, class: 'ds-hero-stat' },
          h('strong', { class: 'ds-hero-stat-n' }, String(b.label != null ? b.label : b)),
          b.desc ? h('span', { class: 'ds-hero-stat-l' }, String(b.desc)) : null,
        )))
    : null;
  return h('div', { class: 'ds-hero' },
    hero.eyebrow ? h('span', { class: 'eyebrow' }, hero.eyebrow) : null,
    h('h1', { class: 'ds-hero-title' }, hero.heading || hero.title || data.title),
    (hero.body || hero.subheading) ? h('p', { class: 'ds-hero-body' },
      hero.body || hero.subheading,
      hero.accent ? h('span', { class: 'ds-hero-accent' }, ' ' + hero.accent) : null,
    ) : null,
    Array.isArray(hero.ctas) && hero.ctas.length
      ? h('div', { class: 'ds-hero-actions' }, ...hero.ctas.map((c, i) =>
          h('a', { key: i, class: i === 0 ? 'btn btn-accent' : 'btn btn-ghost', href: c.href || '#' }, c.label || c.cta || 'go')))
      : null,
    badgeRow,
  );
}

function sectionNode(sec, idx) {
  const rail = RAILS[idx % RAILS.length];
  const features = sec.features || sec.items || [];
  const rows = features.map((f, i) => {
    const kids = [h('div', { key: 't', class: 'ds-feature-title' }, String(f.name || ''))];
    if (f.desc) kids.push(h('div', { key: 'd', class: 'ds-feature-desc', innerHTML: String(f.desc).replace(/`([^`]+)`/g, '<code>$1</code>') }));
    if (f.benefit) kids.push(h('div', { key: 'b', class: 'ds-feature-benefit' }, String(f.benefit)));
    return h('div', { key: i, class: 'ds-feature ' + rail }, ...kids);
  });
  return C.Section({
    title: sec.name || sec.title || sec.id,
    children: [
      sec.lede ? h('p', { class: 'ds-lede' }, sec.lede) : null,
      ...rows,
      sec.body && sec.body.length >= 240 ? h('div', { class: 'page-body', innerHTML: __md(sec.body) }) : null,
    ].filter(Boolean),
  });
}

function examplesNode(examples) {
  if (!examples || !examples.length) return null;
  return C.Section({
    title: 'explore',
    children: examples.map((e, i) => {
      const rail = RAILS[(i + 1) % RAILS.length];
      const kids = [
        h('span', { key: 'c', class: 'code' }, String(i + 1).padStart(2, '0')),
        h('span', { key: 't', class: 'title' }, String(e.label || e.name || e.href || '')),
      ];
      if (e.desc) kids.push(h('span', { key: 'm', class: 'meta dim' }, ' — ' + e.desc));
      kids.push(h('span', { key: 'a', class: 'ds-row-arrow' }, '->'));
      return h('a', { key: i, class: 'row ' + rail, href: e.href || '#' }, ...kids);
    }),
  });
}

// minimal client-side markdown renderer matching server-side renderer (idempotent for already-html bodies)
function __md(md) {
  const lines = String(md || '').split('\n');
  const out = []; let inCode = false, inList = false;
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = (s) => s.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  for (const line of lines) {
    if (line.startsWith('```')) { if (inCode) { out.push('</pre>'); inCode = false; } else { out.push('<pre>'); inCode = true; } continue; }
    if (inCode) { out.push(esc(line)); continue; }
    if (line.startsWith('# ')) out.push('<h1>' + esc(line.slice(2)) + '</h1>');
    else if (line.startsWith('## ')) out.push('<h2>' + esc(line.slice(3)) + '</h2>');
    else if (line.startsWith('### ')) out.push('<h3>' + esc(line.slice(4)) + '</h3>');
    else if (line.startsWith('- ')) { if (!inList) { out.push('<ul>'); inList = true; } out.push('<li>' + inl(esc(line.slice(2))) + '</li>'); }
    else { if (inList) { out.push('</ul>'); inList = false; } if (line.trim()) out.push('<p>' + inl(esc(line)) + '</p>'); }
  }
  if (inList) out.push('</ul>');
  if (inCode) out.push('</pre>');
  return out.join('\n');
}

const bodyNode = data.bodyHtml ? C.Section({ children: h('div', { class: 'page-body', innerHTML: data.bodyHtml }) }) : null;

const mainChildren = [
  heroNode(data.hero),
  ...data.sections.map(sectionNode),
  examplesNode(data.examples),
  bodyNode,
].filter(Boolean);

mount(document.getElementById('app'), () => C.AppShell({
  topbar: C.Topbar({ brand: data.siteName, items: data.navItems, active: data.title }),
  crumb: C.Crumb({ leaf: data.title }),
  main: h('div', { class: 'app-stage' }, ...mainChildren),
  status: C.Status({ left: [data.siteName.toLowerCase(), data.slug], right: ['live'] }),
}));
</script>
</body>
