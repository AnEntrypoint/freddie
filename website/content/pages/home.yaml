title: Freddie
slug: home
hero:
  heading: freddie
  subheading: an open js agent harness — multi-platform, multi-tool, multi-memory
  accent: built so you own the loop, not the vendor.
  body: spin up an agent that lives in your terminal, your dashboard, telegram, slack, discord, sms, signal, matrix, whatsapp, email, and a dozen more. swap the model. swap the memory backend. extend with skills. all from one config tree, no rewrites.
  badges:
    - { label: "12/12", desc: integration groups green }
    - { label: "70+", desc: built-in tools }
    - { label: "16", desc: gateway platforms }
    - { label: "8", desc: memory backends }
    - { label: "JS", desc: "no python, no docker required" }
  ctas:
    - { label: get started, href: "#quick-start" }
    - { label: architecture, href: /architecture/ }
    - { label: github, href: "https://github.com/AnEntrypoint/freddie" }
sections:
  - id: when
    name: when do I reach for freddie?
    lede: pick freddie when you need an agent that goes where your users are, not where the vendor's chat box lives.
    features:
      - name: you want one agent across many surfaces
        desc: terminal repl, web dashboard, telegram bot, discord bot, slack app, sms, email — same brain, same tools, same memory, one process to run.
        benefit: stop building three half-finished bots. one config, one loop, n adapters.
      - name: you want to own the model layer
        desc: anthropic, openai, groq, openrouter, gemini, ollama, bedrock, kilo, opencode, claude-cli — pi-ai routes them all, freddie wraps them in xstate.
        benefit: vendor down -> switch model in config, not in code.
      - name: you want memory that survives sessions
        desc: gm rs-learn (in-process semantic vector recall) is the primary learning store — every turn auto-recalls relevant memories and auto-learns salient outcomes. Eight legacy provider backends remain opt-in.
        benefit: agent remembers a user across conversations without you wiring redis yourself.
      - name: you want to ship without a stack
        desc: pure node. no python, no docker, no kubernetes. `npm install` and you have a dashboard, a cron, a gateway, an acp server, and a cli.
        benefit: a $5 vps runs your full agent surface.
  - id: why
    name: why this over the alternatives?
    lede: most agent harnesses give you a chat box. freddie gives you a substrate.
    features:
      - name: substrate-first, not framework-first
        desc: pi-coding-agent (loop), pi-ai (providers), pi-tui (terminal), floosie (gateway xstate), anentrypoint-design (dashboard), xstate v5. we compose published packages, we don't fork them.
        benefit: when upstream ships a fix, you get it. no fork to maintain.
      - name: real services, real tests
        desc: one `test.js` at the root, ≤200 lines, no mocks, no fixtures. exercises real sqlite, real express, real cron, real adapters. 12 named groups cover the whole surface.
        benefit: green test = green production. no "works in mock" failure mode.
      - name: every subsystem is observed
        desc: structured jsonl logs (`subsystem, severity, ts`) under `~/.freddie/logs/`. `/api/debug` for live introspection. `window.__debug` registry in the dashboard.
        benefit: when a turn goes weird, the answer is one tail away — never a print-statement scramble.
      - name: profile-safe by default
        desc: "`FREDDIE_PROFILE=alice` gives alice her own home, sessions, sqlite, auth, config — same binary, isolated state."
        benefit: ship a multi-tenant agent on day one, no rewrites.
  - id: how
    name: how do I start?
    lede: three commands gets you a working agent. five minutes gets you a dashboard you can chat with.
    features:
      - name: 1 — install
        desc: "`npm install` in the repo, or `npm install -g freddie` for a global cli. no native deps, no pythons, no rust toolchain."
      - name: 2 — pick a model
        desc: "set `ANTHROPIC_API_KEY` (or `OPENAI_API_KEY`, `GROQ_API_KEY`, `OPENROUTER_API_KEY`). pi-ai picks the first one it sees. no model? freddie falls back to the local acptoapi bridge."
      - name: 3 — run
        desc: "`node bin/freddie.js run` for the repl. or `node bin/freddie.js dashboard --port 3000` for the web ui. or `node bin/freddie.js gateway --port 3001` to start the messaging bridge."
      - name: 4 — extend
        desc: "create `plugins/<name>/{plugin,handler}.js` (auto-discovered on bootHost). drop a SKILL.md in `~/.freddie/skills/`. add a platform as `plugins/platform-<name>/`. configure a cron with `freddie cron add '0 9 * * *' '<prompt>'`."
  - id: substrate
    name: substrate (the things we don't reimplement)
    lede: every named dependency below is a published package we treat as a black box. when you run freddie, you're running the union of these.
    features:
      - name: "@mariozechner/pi-coding-agent"
        desc: agent loop, tool dispatch, interactive tui, file auth store, extension runner.
      - name: "@earendil-works/pi-ai"
        desc: "provider layer. `complete`, streaming, cost calc, registerApiProvider, getModel."
      - name: "@mariozechner/pi-agent-core"
        desc: "`agentLoop`, `runAgentLoop`, `streamProxy`. wrapped by xstate, never rewritten."
      - name: floosie
        desc: gateway pipeline as an xstate ProcessorMachine. compose, don't fork.
      - name: anentrypoint-design
        desc: webjsx + ripple-ui design system. dashboard ships with hero, panel, row, chat, file viewer, cron monitor primitives baked in.
      - name: xstate v5
        desc: every long-lived machine — turns, gateways, approvals, compressor — is a real state machine, not a soup of booleans.
