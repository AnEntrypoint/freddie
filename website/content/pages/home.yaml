body: |
  ## quick-start

  ```
  git clone https://github.com/AnEntrypoint/freddie
  cd freddie && npm install
  export ANTHROPIC_API_KEY=sk-ant-...
  node bin/freddie.js run
  node bin/freddie.js dashboard --port 3000
  node bin/freddie.js gateway --port 3001
  ```

  ## what you get out of the box

  - **a repl** that talks to any major LLM, with tool dispatch, slash commands, sessions, FTS search, skill loading.
  - **a dashboard** — chat, sessions, analytics, cron, batch, tools, models, skills, logs, config, env, gateway monitor.
  - **a gateway** that bridges 16 messaging platforms to one agent loop.
  - **an acp server** (json-rpc stdio) for ide integration.
  - **a cron scheduler** + **batch runner** for unattended workflows.
  - **a learning layer** backed by gm rs-learn (in-process semantic recall), with auto-recall + auto-learn on every turn; eight legacy memory providers remain opt-in.
  - **a skills loader** that picks up SKILL.md files from `~/.freddie/skills/` and the bundled tree.

  ## philosophy

  - one file, one concern, ≤200 lines.
  - no comments — naming carries the weight.
  - real tests against real services, no mocks.
  - every subsystem registers `/debug/<name>` and emits structured logs.
  - we compose published packages; we don't maintain forks.
