title: Plugins
slug: plugins
hero:
  heading: plugins
  subheading: every subsystem in freddie is a plugin against one universal contract
  accent: pi for headless, gui for the dashboard, both for full-stack.
  body: >-
    Auto-generated reference of all 128 plugins discovered by bootHost(), registering 70 tools in total.
    Regenerate with `node scripts/gen-plugins-doc.mjs`.
  badges:
    - { label: "128", desc: in-tree plugins }
    - { label: "70", desc: registered tools }
    - { label: "1 contract", desc: pi + gui }
    - { label: surface guard, desc: enforced at load }
  ctas:
    - { label: contract source, href: "https://github.com/AnEntrypoint/freddie/blob/master/src/host/contract.js" }
    - { label: host source, href: "https://github.com/AnEntrypoint/freddie/blob/master/src/host/host.js" }
sections:
  - id: tool
    name: tools (68)
    lede: "agent-callable tools registered via pi.tools.register."
    features:
      - name: "ansi_strip"
        desc: "Strip ANSI escape sequences."
      - name: "approval"
        desc: "Request approval for a destructive action. Returns the user decision (allow|deny). In non-interactive contexts, defaults to deny unless config.acp.always_allow includes this action."
      - name: "bash"
        desc: "Run a shell command. Returns stdout/stderr/exitCode."
      - name: "binary_extensions"
        desc: "Check whether a filename has a known binary extension."
      - name: "browser"
        desc: "Browser automation: navigate, click, type, evaluate, screenshot. Requires puppeteer-core."
        benefit: "requires: puppeteer-core"
      - name: "budget_config"
        desc: "Read/write per-session token budget limits."
      - name: "checkpoint"
        desc: "Save/load/list/delete named JSON checkpoints under ~/.freddie/checkpoints."
      - name: "clarify"
        desc: "Pose a clarifying question to the user before proceeding. Returns the user response. In non-interactive contexts, returns { error } so the agent must proceed with stated assumption."
      - name: "code_execution"
        desc: "Execute a code snippet in a chosen runner (python, node, deno, ruby, bash). Returns stdout/stderr/exitCode."
      - name: "credential_files"
        desc: "Get/set credentials in ~/.freddie/auth/."
      - name: "cronjob"
        desc: "Manage agent cron jobs (add, list, cancel, delete)."
      - name: "debug_helpers"
        desc: "Inspect any registered /debug subsystem."
      - name: "delegate"
        desc: "Spawn a sub-agent to handle a focused task. Returns the sub-agent final result."
      - name: "discord_tool"
        desc: "Send a message to a Discord channel via REST."
        benefit: "requires: DISCORD_BOT_TOKEN"
      - name: "edit"
        desc: "Replace exact string in file. Fails if old_string occurs zero or multiple times unless replace_all."
      - name: "env_passthrough"
        desc: "Compute the env-var subset that should be passed through to spawned shells."
      - name: "feishu_doc"
        desc: "Read or update a Feishu doc by token."
        benefit: "requires: FEISHU_APP_TOKEN"
      - name: "feishu_drive"
        desc: "List or download Feishu Drive files."
        benefit: "requires: FEISHU_APP_TOKEN"
      - name: "file_operations"
        desc: "move/copy/delete/mkdir/stat — atomic file ops."
      - name: "file_state"
        desc: "Track files modified in this session (read|write|edit|delete) for diff-summary purposes."
      - name: "file_tools"
        desc: "list/glob files (recursive walk skipping node_modules, .git, dist)."
      - name: "fuzzy_match"
        desc: "Score a candidate string against a needle. Returns 0 for no match, higher for better match."
      - name: "grep"
        desc: "Recursive regex search across files. Returns file:line:content matches."
      - name: "homeassistant_tool"
        desc: "Read state or call a service on Home Assistant."
        benefit: "requires: HASS_TOKEN, HASS_URL"
      - name: "image_gen"
        desc: "Generate an image from a prompt. Routes through acptoapi /v1/images/generations."
        benefit: "requires: OPENAI_API_KEY or REPLICATE_API_TOKEN"
      - name: "interrupt"
        desc: "Set/clear/check interrupt flag for a session — agent loop polls and exits early."
      - name: "managed_tool_gateway"
        desc: "Proxy: dispatch any registered tool by name with arguments. Used for tool-level audit and policy interception."
      - name: "mcp_oauth"
        desc: "OAuth flow for an MCP server: build authorize URL, exchange code for token."
      - name: "mcp_oauth_manager"
        desc: "Persist & retrieve MCP OAuth tokens. Actions: store, get, list, delete, refresh."
      - name: "mcp_tool"
        desc: "Connect to an external MCP server (stdio) and call its tools."
      - name: "memory"
        desc: "Add/search/list memory. Routes to configured provider or local SQLite fallback."
      - name: "mixture_of_agents"
        desc: "Run the same prompt through N sub-agents (different models or seeds), then synthesize the results. Reduces variance."
      - name: "neutts_synth"
        desc: "Local NeuTTS synth (alternate TTS backend)."
        benefit: "requires: NEUTTS_URL"
      - name: "openrouter_client"
        desc: "tool-openrouter_client"
      - name: "osv_check"
        desc: "Query osv.dev for known vulnerabilities. Pass either {package, version, ecosystem} or {commit_sha, repo}."
      - name: "patch_parser"
        desc: "Apply a unified diff to files in cwd. Returns per-file results."
      - name: "path_security"
        desc: "Check whether a path is allowed (no /etc/passwd, no .ssh/, etc)."
      - name: "process_registry"
        desc: "List/kill spawned background processes tracked by freddie."
      - name: "read"
        desc: "Read a file from disk. Returns lines with line numbers."
      - name: "rl_training"
        desc: "Kick off an RL rollout (Atropos integration)."
        benefit: "requires: ATROPOS_URL"
      - name: "schema_sanitizer"
        desc: "Strip dangerous fields (eval, exec, __proto__) from a tool schema."
      - name: "send_message"
        desc: "Send a message to a recipient on the named platform. Uses the gateway adapter; requires the platform credentials."
      - name: "session_search"
        desc: "Full-text search across past session messages. Returns hits with session_id and content snippet."
      - name: "skill_manager"
        desc: "List, fetch, or invoke a skill from ~/.freddie/skills/ or bundled skills/."
      - name: "skill_usage"
        desc: "Track / query skill invocation stats."
      - name: "skills_guard"
        desc: "Inspect skill body for dangerous patterns (rm -rf /, fork bombs, secrets) before injection."
      - name: "skills_hub"
        desc: "Browse and install community skills."
      - name: "skills_index"
        desc: "Build a search index of available skills (name + description + first-line of body) for the agent to query."
      - name: "skills_sync"
        desc: "Sync ~/.freddie/skills/ with a remote git repo (clone or pull)."
      - name: "skills_tool"
        desc: "tool-skills_tool"
      - name: "slash_confirm"
        desc: "Resolve a slash command and indicate whether it requires confirmation before running."
      - name: "terminal"
        desc: "Open a long-lived shell session, send input lines, capture output. Actions: open, send, read, close."
      - name: "tirith_security"
        desc: "Evaluate a candidate action against ~/.freddie/policy.json. Returns allow|deny|ask."
      - name: "todo"
        desc: "Manage per-session todos. Actions: add, list, update, complete, delete."
      - name: "tool_backend_helpers"
        desc: "Helper meta-tool: describeTools(filter), shapeArgs(schema, args)."
      - name: "tool_output_limits"
        desc: "Apply the configured output truncation cap to a string."
      - name: "tool_result_storage"
        desc: "Persist a large tool result to disk; return reference token. Actions: store, fetch, list, delete."
      - name: "transcription"
        desc: "Transcribe audio via acptoapi /v1/audio/transcriptions (OpenAI Whisper)."
        benefit: "requires: OPENAI_API_KEY"
      - name: "tts"
        desc: "Synthesize speech (OpenAI tts-1 or ElevenLabs) via acptoapi."
        benefit: "requires: OPENAI_API_KEY or ELEVENLABS_API_KEY"
      - name: "url_safety"
        desc: "Heuristic URL safety check (private IPs, known-bad TLDs, scheme)."
      - name: "vision"
        desc: "Describe an image (URL or base64) via acptoapi chat-completions."
        benefit: "requires: OPENAI_API_KEY or ANTHROPIC_API_KEY (provided to acptoapi)"
      - name: "voice_mode"
        desc: "Toggle full-duplex voice (transcription in + tts out) for the active session. Returns the new state."
      - name: "web_search"
        desc: "Search the web (DuckDuckGo HTML or SerpAPI). Returns title/url/snippet list."
        benefit: "requires: SERPAPI_KEY (optional, falls back to DDG)"
      - name: "web_tools"
        desc: "tool-web_tools"
      - name: "website_policy"
        desc: "Per-host fetch policy (rate limit, allow/deny). Reads config.website_policy."
      - name: "write"
        desc: "Write content to a file (overwrites)."
      - name: "xai_http"
        desc: "tool-xai_http"
      - name: "yuanbao_tools"
        desc: "Tencent Yuanbao chat completion (Hunyuan)."
        benefit: "requires: YUANBAO_API_KEY"
