title: Architecture
slug: architecture
hero:
  heading: architecture
  subheading: 11 small subsystems, every one ≤200 lines, every one observable
  accent: composition over framework. always.
  body: freddie's architecture is a thin layer over published packages. each subsystem owns one concern, registers a `/debug/<name>` endpoint, emits structured logs, and is replaced by changing one file. nothing is private. nothing is magic.
  badges:
    - { label: "11", desc: subsystems }
    - { label: "≤200L", desc: per file }
    - { label: xstate v5, desc: every long-lived machine }
  ctas:
    - { label: AGENTS.md, href: "https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md" }
sections:
  - id: when
    name: when do you read this page?
    lede: when you want to know where a behavior lives, or where to add one.
    features:
      - name: you're tracing a turn
        desc: agent loop -> tool dispatch -> session append -> memory sync. follow the path through `src/agent/machine.js`.
        benefit: every transition is a named state. xstate makes the graph explicit.
      - name: you're adding a feature
        desc: this page tells you which subsystem owns it. add a tool? `src/tools/`. add a platform? `src/gateway/platforms/`. add a memory provider? `src/plugins/memory/`.
        benefit: no "where does this go" guessing.
      - name: you're debugging
        desc: every subsystem has `/debug/<name>` and a jsonl log. `tail` the log, hit the endpoint, read the state.
        benefit: incident -> root cause in minutes, not hours.
  - id: agent-loop
    name: agent loop
    lede: xstate v5 turn machine wraps `@mariozechner/pi-agent-core`'s `runAgentLoop`.
    features:
      - name: machine
        desc: "`src/agent/machine.js` — turn choreography, tool dispatch, error recovery."
      - name: llm bridge
        desc: "`src/agent/pi-bridge.js` — pi-ai provider adapter (anthropic/openai/groq/openrouter)."
      - name: resolver
        desc: "`src/agent/llm_resolver.js` — picks pi-bridge -> acptoapi -> throw, in priority order."
  - id: context-engine
    name: context engine + compressor
    lede: builds the system message, prunes history when the budget is tight.
    features:
      - name: builder
        desc: "`src/context/engine.js` — file context, skills, memory, tool descriptions composed into one message."
      - name: compressor
        desc: "`src/agent/compress/` — head/middle/tail policy + handoff prompt + iterative updates."
      - name: budget
        desc: token-aware. drops middle, preserves recent + handoff.
  - id: tools
    name: tool registry + environments
    lede: 70+ tools auto-discovered. environments select where they run.
    features:
      - name: registry
        desc: "`src/tools/registry.js` — register, dispatch, list."
      - name: environments
        desc: "`src/tools/environments/{local,docker,ssh}.js` — one shape, three executors."
      - name: toolsets
        desc: "`src/toolsets.js` — opt-in subsets (`core`, `browse`, `creative`)."
  - id: gateway
    name: gateway + platforms
    lede: 16 adapters, one event hub.
    features:
      - name: gateway
        desc: "`src/gateway/run.js` — adapter mounts + hooks chain + agent wiring."
      - name: adapters
        desc: "`src/gateway/platforms/*.js` — telegram, discord, slack, whatsapp, sms, email, matrix, signal, mattermost, zulip, dingtalk, feishu, wechat, wecom, qq, bluebubbles, hass, webhook, api_server."
  - id: storage
    name: storage + memory
    lede: sqlite for sessions + 8 plugin backends for memory.
    features:
      - name: sessions
        desc: "`src/sessions.js` — libsql + fts5 full-text search."
      - name: memory tool
        desc: "`src/tools/memory.js` — routes to configured provider, falls back to local sqlite."
      - name: providers
        desc: "`src/plugins/memory/{honcho,mem0,supermemory,byterover,hindsight,openviking,retaindb,holographic}.js`."
      - name: auth
        desc: "`src/auth.js` — FileAuthStore for credential persistence (pi-ai compatible)."
  - id: skills
    name: skills + commands
    lede: SKILL.md loader + slash command registry.
    features:
      - name: loader
        desc: "`src/skills/index.js` — discovers `~/.freddie/skills/` and bundled tree."
      - name: commands
        desc: "`src/commands/registry.js` — slash command definitions, gateway/telegram/slack views derived."
  - id: dashboard
    name: dashboard + acp
    lede: web ui (anentrypoint-design webjsx) and json-rpc stdio.
    features:
      - name: dashboard server
        desc: "`src/web/server.js` — express + /api endpoints + SSE chat."
      - name: dashboard app
        desc: "`src/web/app.js` — webjsx components, motion, live chat, file viewer."
      - name: acp
        desc: "`src/acp/server.js` — json-rpc stdio for ide integration."
  - id: workflows
    name: workflows
    lede: cron and batch turn freddie into an unattended worker.
    features:
      - name: cron
        desc: "`src/cron/scheduler.js` — persistent jobs, in-process scheduler, async surface."
      - name: batch
        desc: "`src/batch.js` — parallel prompt runner with bounded concurrency."
  - id: observability
    name: observability
    lede: every subsystem emits jsonl + registers `/debug/<name>`.
    features:
      - name: logs
        desc: "`src/observability/log.js` — `{subsystem, severity, ts, fields}` rows under `~/.freddie/logs/`."
      - name: debug registry
        desc: "`src/observability/debug.js` — `register(name, snapshotFn)` + `/api/debug` aggregator."
  - id: home
    name: home + profiles + config
    lede: profile-aware home, durable config with migrations.
    features:
      - name: home
        desc: "`src/home.js` — `getFreddieHome()`, `applyProfileOverride()`, profile-safe paths."
      - name: config
        desc: "`src/config.js` — `loadConfig()`, `saveConfigValue()`, `_config_version` migrations."
      - name: skins
        desc: "`src/skin/engine.js` — built-in + user skins, hot-swap via `/skin <name>`."
examples:
  - { label: AGENTS.md, href: "https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md", desc: full subsystem deep dives }
  - { label: src tree, href: "https://github.com/AnEntrypoint/freddie/tree/master/src", desc: code itself }
  - { label: test.js, href: "https://github.com/AnEntrypoint/freddie/blob/master/test.js", desc: 200-line integration test }
body: |
  ## conventions

  - one file = one concern; ≤200 lines, hard cap.
  - no comments — naming carries the weight.
  - real services in tests, no mocks.
  - every subsystem registers `/debug/<name>` and emits structured logs.
  - composed packages > forks; xstate for every long-lived machine.

  ## debugging

  ```
  curl http://127.0.0.1:3000/api/debug
  curl http://127.0.0.1:3000/api/debug/agent
  tail -f ~/.freddie/logs/agent.log
  ```

  ## further reading

  - [AGENTS.md](https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md) — subsystem deep dive.
  - [CHANGELOG.md](https://github.com/AnEntrypoint/freddie/blob/master/CHANGELOG.md) — release history.
