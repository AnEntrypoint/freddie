body: |
  ```html
  <div style="border:1px solid var(--line, #333); border-radius:8px; overflow:hidden; margin:2rem 0;">
    <iframe
      src="https://anentrypoint.github.io/thebird/"
      title="thebird live demo"
      style="width:100%; height:70vh; min-height:480px; border:0; display:block;"
      loading="lazy"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"
    ></iframe>
  </div>
  ```

  if the frame above stays blank, your browser or an extension may be blocking third-party iframes — [open thebird directly](https://anentrypoint.github.io/thebird/) instead.
