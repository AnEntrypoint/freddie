title: CLI
slug: cli
hero:
  heading: cli
  subheading: every freddie surface starts as one command in your terminal
  accent: install it once. ssh in. it just works.
  body: >-
    Auto-generated reference of all 22 slash commands in the command registry, grouped by category.
    Regenerate with `node scripts/gen-cli-docs.mjs`.
  badges:
    - { label: "22", desc: registered commands }
    - { label: "5", desc: categories }
