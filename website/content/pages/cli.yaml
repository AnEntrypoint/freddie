title: CLI
slug: cli
hero:
  heading: cli
  subheading: every freddie surface starts as one command in your terminal
  accent: install it once. ssh in. it just works.
  body: the cli wraps the agent loop, the dashboard, the gateway, the acp server, the cron, the batch runner, and the session store. each subcommand is one verb. no daemons, no configs to author before you can poke.
  badges:
    - { label: commander, desc: js cli framework }
    - { label: "19 verbs", desc: top-level subcommands }
    - { label: "/help-all", desc: in-repl reference }
  ctas:
    - { label: bin/freddie.js, href: "https://github.com/AnEntrypoint/freddie/blob/master/bin/freddie.js" }
sections:
  - id: start
    name: getting started in three commands
    lede: keys, a workspace, a conversation — each is one verb.
    features:
      - name: "keys -> `freddie auth set <provider>`"
        desc: paste your api key once. read from stdin or a masked prompt, never argv, so it never lands in shell history. `freddie auth list` shows what's set and where it came from (env or stored).
        benefit: no editing dotfiles to get online.
      - name: "workspace -> `freddie project use <name>`"
        desc: each project is an isolated home (own sessions, config, plugins). `freddie project list` marks the active one. `create <name> <path>` makes a new one.
        benefit: client and personal work never share state.
      - name: "conversation -> `freddie run --resume`"
        desc: every chat persists. `freddie session list` shows them by title, `session show <id>` prints the transcript, and `run --resume [id]` picks up where you left off.
        benefit: ctrl+c is safe and nothing is ever lost.
      - name: "health -> `freddie doctor`"
        desc: one screen — which keys are live, the active project and its home path, how many conversations are saved, and the environment checks. `freddie setup` walks a first-run wizard.
        benefit: when something's off, doctor tells you what.
  - id: when
    name: when do I use which command?
    lede: pick the verb by what you're doing.
    features:
      - name: chatting -> `freddie run`
        desc: interactive repl. tools dispatch live, slash commands work, sessions persist across runs.
        benefit: fastest path to "is the model online".
      - name: monitoring -> `freddie dashboard`
        desc: web ui at localhost. chat, sessions, analytics, cron, batch, tools, models, skills, logs, config, env, gateway.
        benefit: one page to see what the agent is doing right now.
      - name: bridging -> `freddie gateway`
        desc: starts the messaging gateway. webhook receivers + outbound senders. agent loop on the other side.
        benefit: turns freddie into a multi-platform bot in one process.
      - name: integrating -> `freddie acp`
        desc: json-rpc stdio server (agent-context-protocol). designed for ide plugins.
        benefit: drop freddie into vscode/jetbrains/zed without writing a transport.
      - name: scheduling -> `freddie cron`
        desc: persistent cron jobs. add/list/cancel/delete. fires the agent on a schedule.
        benefit: unattended work — daily standup, hourly check-in, weekly digest.
      - name: parallelizing -> `freddie batch`
        desc: read prompts from a file, run them in parallel with bounded concurrency.
        benefit: bulk eval, content gen, codebase analysis without a queue system.
      - name: spelunking -> `freddie sessions` + `freddie search`
        desc: list past sessions. fts5 full-text search across every message ever.
        benefit: never lose a thread. every conversation is recallable.
      - name: switching context -> `freddie profile` + `freddie skin`
        desc: profiles isolate state per persona. skins switch the ui theme.
        benefit: client/personal/dev profiles with separate sessions and config.
  - id: why
    name: why a single binary?
    lede: a single js binary is portable, debuggable, and one-line installable.
    features:
      - name: ssh-friendly
        desc: works on a $5 vps. no system services, no port openings beyond what you start.
        benefit: deploy by `git clone && npm install`.
      - name: zero global state
        desc: everything lives under `~/.freddie/` (or your `FREDDIE_PROFILE`). delete the dir, you're back to defaults.
        benefit: no registry, no `/etc/freddie/`, no services to uninstall.
      - name: discoverable
        desc: "`freddie help-all` lists every subcommand and slash command in one screen."
        benefit: you don't have to memorize anything.
  - id: how
    name: how does the repl actually feel?
    lede: a real terminal. real readline. real ansi. slash commands tab-complete.
    features:
      - name: slash commands
        desc: "/help, /quit, /clear, /profile, /sessions, /search, /resume, /model, /provider, /toolsets, /tools, /skills, /skill, /memory, /skin, /config, /logs, /status, /copy, /paste, /reset."
      - name: tool dispatch
        desc: agent decides which tools to call. you see each call + result inline.
      - name: session resumption
        desc: ctrl+c is safe. reload via `freddie run --resume <id>` or `/resume <id>`.
examples:
  - { label: bin/freddie.js, href: "https://github.com/AnEntrypoint/freddie/blob/master/bin/freddie.js", desc: commander entry }
  - { label: interactive repl, href: "https://github.com/AnEntrypoint/freddie/blob/master/src/cli/interactive.js", desc: readline + slash commands }
  - { label: command registry, href: "https://github.com/AnEntrypoint/freddie/blob/master/src/commands/registry.js", desc: slash command defs }
body: |
  ## install

  ```
  npm install -g freddie
  # or, in this repo:
  npm install
  ```

  ## the verbs

  ```
  freddie setup                 # guided first-run: provider, key, defaults
  freddie doctor                # health: keys, project, conversations, env
  freddie auth [list|set <provider>|rm <provider>|test|show]   # provider api keys
  freddie project [list|create <name> <path>|use <name>|rm <name>|current]  # workspaces
  freddie session [list|show <id>|rm <id>]   # conversation transcripts
  freddie tools                 # list tools
  freddie skills                # list skills
  freddie sessions              # list past sessions
  freddie search "<query>"      # fts5 across messages
  freddie run [--resume <id>]   # interactive repl (--resume continues a chat)
  freddie dashboard --port 3000 # web ui
  freddie gateway --port 3001   # messaging bridge
  freddie acp                   # json-rpc stdio
  freddie cron list             # scheduled jobs
  freddie batch <file>          # parallel runner
  freddie profile [list|create|switch|delete]
  freddie skin [name]
  freddie help-all              # all subcommands + slash commands
  ```

  ## environment

  - `FREDDIE_HOME` — override `~/.freddie/`.
  - `FREDDIE_PROFILE` — switch to a profile-scoped home (`~/.freddie/profiles/<name>/`).
  - `ANTHROPIC_API_KEY` / `OPENAI_API_KEY` / `GROQ_API_KEY` / `OPENROUTER_API_KEY` — provider keys, picked up by pi-ai.
  - platform tokens (`TELEGRAM_BOT_TOKEN` etc) — light up the gateway adapters.
