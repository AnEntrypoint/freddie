  - { label: interactive repl, href: "https://github.com/AnEntrypoint/freddie/blob/master/src/cli/interactive.js", desc: readline + slash commands }
  - { label: command registry, href: "https://github.com/AnEntrypoint/freddie/blob/master/src/commands/registry.js", desc: slash command defs }
body: |
  ## all commands

  ```
  /help                        Show available commands
  /quit                        Exit freddie
  /clear                       Clear conversation history
  /resume [session-id]         Resume a previous session
  /sessions                    List recent sessions
  /search <query>              Search messages full-text
  /background <prompt>         Run command in background
  /model [model]               Set or show current model
  /provider [provider]         Set or show current provider
  /toolsets                    List or toggle toolsets
  /tools                       List available tools
  /skills                      Skills hub: install, list, run
  /skill <name>                Run a skill by name
  /memory                      Memory provider commands
  /skin [name]                 Switch CLI skin
  /profile <list|create|switch|delete> Manage profiles
  /logs                        Tail logs
  /config [key] [value]        Show/set config values
  /status                      Agent + gateway status
  /copy                        Copy last response
  /paste                       Paste from clipboard
  /reset                       Reset session state
  ```
