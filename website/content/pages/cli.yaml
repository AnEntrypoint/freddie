body: |
  # CLI

  Freddie ships as `freddie` command. Install via npm:

  ```bash
  npm install -g freddie
  ```

  ## Top Commands

  ### freddie tools
  List available tools (bash, read, write, edit, grep, memory, delegate, browser, etc).

  ```
  $ freddie tools
  11 tools registered (core: 8 + env: 2 + external: 1)
  ```

  ### freddie run
  Start interactive agent REPL. Press Ctrl+C to exit.

  ```
  $ freddie run
  Agent ready. Type your prompt or /help for slash commands.
  ```

  ### freddie dashboard --port 3000
  Web UI: sessions, chat, analytics, cron jobs, skills, config, logs.

  ```
  $ freddie dashboard --port 3000
  Dashboard running at http://localhost:3000
  ```

  ### freddie gateway --platform telegram
  Start messaging gateway (webhook + agent loop). Requires platform credentials.

  ```
  $ export TELEGRAM_BOT_TOKEN=...
  $ freddie gateway --platform telegram --port 3001
  Gateway listening at http://localhost:3001
  ```

  ## Full Reference

  ### Session & History
  - `freddie sessions` — list recent sessions + search
  - `freddie search "<query>"` — full-text search over messages
  - `freddie resume <id>` — continue a session

  ### Configuration
  - `freddie profile [list|create|switch|delete]` — multi-user profiles
  - `freddie skin [name]` — switch UI theme
  - `freddie config [key] [value]` — view/set config

  ### Skills & Tools
  - `freddie skills` — list bundled + custom skills
  - `freddie skill <name>` — show skill details
  - `freddie tools` — list + filter tools

  ### Workflows
  - `freddie cron [list|add|cancel|tick]` — scheduled jobs
  - `freddie batch <file>` — parallel task runner
  - `freddie acp` — JSON-RPC stdio for IDE integration

  ### Help
  - `freddie help-all` — all slash commands (inside REPL)
  - `freddie -h` — command-line help

  ## Slash Commands in REPL

  - `/help`, `/quit`, `/clear`
  - `/profile [list|switch <name>]`
  - `/sessions`, `/search <query>`, `/resume <id>`
  - `/model [name]`, `/provider [name]`
  - `/toolsets`, `/tools`, `/skills`, `/skill <name>`
  - `/memory`, `/skin [name]`, `/config [key] [value]`
  - `/logs`, `/status`, `/copy`, `/paste`, `/reset`
