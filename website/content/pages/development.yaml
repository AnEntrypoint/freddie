title: Development
slug: development
hero:
  heading: development
  subheading: one test.js, one PRD, one rule per file
  accent: discipline ships features. yelling does not.
  body: freddie's development style is enforced by the code, not the readme. one integration test at the root, capped at 200 lines. one concern per file, capped at 200 lines. no mocks, no scattered tests, no leftover comments. PRDs in `.gm/prd.yml` carry every change.
  badges:
    - { label: "12/12", desc: integration groups green }
    - { label: "200L", desc: per-file cap }
    - { label: real services, desc: no mocks ever }
  ctas:
    - { label: AGENTS.md, href: "https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md" }
    - { label: open issues, href: "https://github.com/AnEntrypoint/freddie/issues" }
sections:
  - id: when
    name: when do you contribute?
    lede: when the test surface tells you what to add, and the PRD format tells you how to plan it.
    features:
      - name: a tool you wish freddie had
        desc: "drop a file in `src/tools/`. extend `tools+toolsets` in `test.js` with one dispatch assertion."
        benefit: tool is live + tested in one PR.
      - name: a platform you want to bridge
        desc: "extend EventEmitter, implement start/stop/send. extend `gateway+platforms+hooks` group with a stub-shape loop check."
        benefit: adapter is registered + smoke-tested in one PR.
      - name: a skill that captures your team's process
        desc: drop `SKILL.md` under `skills/<category>/<name>/`. the loader picks it up.
        benefit: skill is bundled in next release.
      - name: a memory provider for a backend you use
        desc: drop a file in `src/plugins/memory/`, implement `syncTurn` + `prefetch`. extend `plugins+memory` group.
        benefit: provider works against the real api in `test.js`.
  - id: testing
    name: how testing works
    lede: one test.js. 200 lines. no fixtures. no mocks. real sqlite, real express, real cron, real adapters.
    features:
      - name: 12 named groups
        desc: "home+config+skin · sessions+FTS5 · tools+toolsets · agent-machine · gateway+platforms+hooks · acp-full · plugins+memory · profiles+observability+auth+env+context+cron+batch+slash+skills · utils+time+redact+model-meta+agent-helpers · mcp+swe+distributions+account+credpool · compressor+trajectory · env+pi+cli+tui+setup+website+helpers"
      - name: combined groups by design
        desc: subsystem A's test exercises B as a side effect → drop B's redundant assertion. test surface grows linearly with subsystem count.
        benefit: 200 lines covers the entire surface; new subsystem usually folds into an existing group.
      - name: real-services rule
        desc: tests boot real express, real libsql, real cron, real gateway adapters. fails when prod fails.
        benefit: green test = green prod. no mock-divergence.
      - name: hygiene at edit time
        desc: every change to `test.js` prefers compaction over expansion. budget is the forcing function.
        benefit: file never bloats; coverage never drops.
  - id: layout
    name: project layout
    lede: ten directories, one job each.
    features:
      - name: bin/
        desc: cli entry (`freddie.js`, commander).
      - name: src/agent/
        desc: xstate turn machine, pi-bridge, llm resolver, compressor.
      - name: src/tools/
        desc: 70+ tool files + registry + environments.
      - name: src/gateway/
        desc: gateway runtime + 16 platform adapters.
      - name: src/web/
        desc: dashboard server + webjsx app.
      - name: src/plugins/memory/
        desc: 8 memory provider modules.
      - name: src/skills/
        desc: skill loader (looks at `~/.freddie/skills/` + bundled).
      - name: src/cron/, src/batch.js
        desc: scheduler + parallel runner.
      - name: src/observability/
        desc: jsonl logs + `/debug/<name>` registry.
      - name: skills/
        desc: bundled SKILL.md tree (5 categories).
      - name: website/
        desc: this site (flatspace + anentrypoint-design).
      - name: test.js
        desc: integration test, ≤200 lines, real services.
  - id: how
    name: how do I contribute?
    lede: open an issue, or send a pr against `master`.
    features:
      - name: 1 — read AGENTS.md
        desc: subsystem deep dives, gotchas, conventions.
      - name: 2 — write a PRD
        desc: any non-trivial change goes through `.gm/prd.yml`. the format is at the top of `AGENTS.md`.
      - name: 3 — extend test.js
        desc: prefer folding into an existing group. only add a new group when failure mode is genuinely orthogonal.
      - name: 4 — keep files ≤200 lines
        desc: hard cap. when a file outgrows the budget, split by concern.
      - name: 5 — push
        desc: ci runs test.js, builds the website, deploys to gh-pages.
examples:
  - { label: AGENTS.md, href: "https://github.com/AnEntrypoint/freddie/blob/master/AGENTS.md", desc: full agent guide }
  - { label: test.js, href: "https://github.com/AnEntrypoint/freddie/blob/master/test.js", desc: 12 integration groups }
  - { label: CHANGELOG.md, href: "https://github.com/AnEntrypoint/freddie/blob/master/CHANGELOG.md", desc: release history }
  - { label: open issues, href: "https://github.com/AnEntrypoint/freddie/issues", desc: where to start }
body: |
  ## quick contributor checklist

  - [ ] file is ≤200 lines
  - [ ] no `// TODO` and no commented-out blocks
  - [ ] test.js still passes (`node test.js`)
  - [ ] new behavior covered in an existing or new group
  - [ ] CHANGELOG.md gets a one-liner

  ## website

  ```
  cd website
  npx flatspace build
  ```

  output: `website/docs/` (deployed to gh-pages by ci).

  ## release

  CHANGELOG.md → bump version in `package.json` → tag → push.
