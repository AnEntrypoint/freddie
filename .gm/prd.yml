- id: convert-skills-cron-commands-to-plugins
  subject: Move skills loader, cron scheduler, slash command registry into plugins
  status: pending
  description: |
    plugins/core-skills/ owns SKILL.md discovery via pi.skill registrations.
    plugins/core-cron/ owns scheduler + cron tool registration.
    plugins/core-commands/ owns slash command registration via pi.command.
  effort: small
  category: refactor
  route_family: state
  load: 0.6
  acceptance:
    - plugins/core-skills/, plugins/core-cron/, plugins/core-commands/ exist
    - host.pi.skills.list() returns skills from bundled tree
    - host.pi.commands.list() returns slash commands
    - test.js still 12/12
- id: convert-dashboard-routes-to-gui-plugins
  subject: Move src/web/server.js routes into plugins/gui-* using gui.route + gui.page
  status: pending
  description: |
    Each /api/* route group becomes its own gui plugin (gui-sessions, gui-tools,
    gui-cron, gui-skills, gui-config, gui-env, gui-debug, gui-chat, gui-batch,
    gui-gateway). plugins/gui-shell/ owns the express boot and AppShell mount.
  effort: large
  category: refactor
  route_family: representation
  load: 0.85
  acceptance:
    - GET /api/health /api/sessions /api/tools /api/cron /api/skills /api/config all 200
    - test.js dashboard SSE chat passes
    - src/web/server.js becomes a thin host->express shim
- id: convert-agent-machine-and-context-to-plugins
  subject: Wrap agent machine + context engine + compressor as core plugins
  status: pending
  description: |
    plugins/core-agent-machine/ exposes pi.agentExt('runTurn', fn).
    plugins/core-context-engine/ registers builders via pi.context.
    plugins/core-compressor/ registers preLlmCall hook when budget exceeded.
  effort: medium
  category: refactor
  route_family: reasoning
  load: 0.9
  acceptance:
    - host.pi.agentExts.get('runTurn') round-trips
    - host.pi.contexts.list().length >= 1
    - test.js agent-machine + compressor groups green
- id: cli-discovers-commands-from-plugins
  subject: bin/freddie.js asks host for CLI commands and registers them with commander
  status: pending
  description: |
    Each plugin can register a CLI subcommand via pi.commands.register({name, description, args, action}).
    bin/freddie.js becomes a thin loop that boots the host then iterates host.pi.commands.list().
  effort: medium
  category: refactor
  route_family: execution
  load: 0.7
  acceptance:
    - node bin/freddie.js --help lists plugin-sourced subcommands
    - existing subcommands all still work
