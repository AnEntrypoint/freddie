- id: claude-client-shape
  claim: acptoapi/lib/claude-client.js exposes a function we can use to spawn claude CLI as an LLM backend
  witness_method: Read C:/dev/acptoapi/lib/claude-client.js
  witness_evidence: "Read 82L. Exports: CLAUDE_MODELS=[claude-haiku-4-5,claude-sonnet-4-6,claude-opus-4-7,haiku,sonnet,opus], CLAUDE_DEFAULT='sonnet', isClaudeModel(fullModel)=/^claude\\//, parseClaudeModel(fullModel), probeClaude(bin,timeoutMs), async generator streamClaude({prompt,model,systemPrompt,bin,signal,tools,permissionMode,cwd}) — spawns `claude -p <prompt> --output-format stream-json --verbose --model <m> ...` and yields parsed JSON events. claude-translate.js (87L) exports createClaudeMapper(id,model) translating stream events to OpenAI chunk format via makeChunk. CONFIRMED claude CLI is wired as a streaming LLM backend in acptoapi."
  status: witnessed
