name: sync-upstream

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/sync-upstream.mjs --dry-run
      - run: node scripts/sync-upstream.mjs
      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(deps): sync sibling upstream versions'
          title: 'chore(deps): sync sibling upstream versions'
          body: 'Automated sibling-package version bump produced by scripts/sync-upstream.mjs.'
          branch: chore/sync-upstream
          delete-branch: true
