name: browser-bundle

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build browser bundle
        run: npm run build:browser

      - name: Stage publish dir
        run: |
          mkdir -p publish/browser
          cp -r dist/browser/* publish/browser/
          mkdir -p publish/skills
          if [ -d skills ]; then cp -r skills/* publish/skills/; fi

      - name: Generate skills manifest
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const root = 'publish/skills';
            const out = [];
            function walk(dir, rel) {
              for (const e of fs.readdirSync(path.join(root, dir), { withFileTypes: true })) {
                const sub = dir ? dir + '/' + e.name : e.name;
                if (e.isDirectory()) walk(sub, rel);
                else if (e.name === 'SKILL.md') {
                  const id = dir;
                  const category = dir.split('/')[0] || '';
                  const shortName = dir.split('/').slice(1).join('/') || dir;
                  out.push({ id, category, shortName, name: id, description: '', path: dir + '/SKILL.md' });
                }
              }
            }
            if (fs.existsSync(root)) walk('', '');
            fs.writeFileSync(path.join(root, 'manifest.json'), JSON.stringify(out, null, 2));
            console.log('manifest entries:', out.length);
          "

      - name: Publish to gh-pages /browser/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          keep_files: true
          destination_dir: .
